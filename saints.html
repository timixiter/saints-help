<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · INFORMATION SAINTS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* ===== GLOBAL ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0b0e1a;
      color: #e5e9f0;
      overflow-x: hidden;
      min-height: 100vh;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 8px; }

    /* ===== PARTICLE CANVAS ===== */
    #particles-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
    }

    .app-wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .container-custom {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem;
      width: 100%;
    }

    /* ===== HEADER ===== */
    .header {
      backdrop-filter: blur(16px);
      background: rgba(11, 14, 26, 0.7);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .header-logo {
      filter: drop-shadow(0 0 12px rgba(79, 70, 229, 0.3));
      transition: filter 0.3s;
    }
    .header-logo:hover { filter: drop-shadow(0 0 20px rgba(79, 70, 229, 0.6)); }
    .glow-text {
      text-shadow: 0 0 40px rgba(79, 70, 229, 0.25);
    }

    /* ===== GLASS CARD ===== */
    .glass-card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 1.5rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .glass-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(79, 70, 229, 0.15);
    }

    /* ===== FORM ===== */
    .form-input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 0.75rem;
      padding: 0.7rem 1rem;
      color: #e5e9f0;
      width: 100%;
      transition: all 0.3s;
      outline: none;
    }
    .form-input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
    }
    .form-input::placeholder {
      color: rgba(255,255,255,0.25);
    }

    .btn-primary {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      border: none;
      padding: 0.6rem 1.8rem;
      border-radius: 9999px;
      font-weight: 600;
      transition: all 0.3s;
      box-shadow: 0 4px 16px rgba(79, 70, 229, 0.3);
    }
    .btn-primary:hover {
      transform: scale(1.04);
      box-shadow: 0 8px 32px rgba(79, 70, 229, 0.5);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #e5e9f0;
      padding: 0.6rem 1.8rem;
      border-radius: 9999px;
      font-weight: 500;
      transition: all 0.3s;
    }
    .btn-secondary:hover {
      background: rgba(79, 70, 229, 0.15);
      transform: scale(1.04);
    }

    .admin-item {
      background: rgba(255,255,255,0.03);
      border-radius: 1rem;
      padding: 1rem 1.2rem;
      border: 1px solid rgba(255,255,255,0.04);
      transition: all 0.3s;
    }
    .admin-item:hover {
      background: rgba(79, 70, 229, 0.06);
      border-color: rgba(79, 70, 229, 0.15);
    }

    /* ===== ANIMATIONS ===== */
    .fade-in {
      animation: fadeInUp 0.5s ease forwards;
      opacity: 0;
    }
    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      .header .container-custom { flex-wrap: wrap; }
      .header-logo span { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

  <canvas id="particles-canvas"></canvas>

  <div class="app-wrapper">
    <header class="header sticky top-0 z-50">
      <div class="container-custom flex items-center justify-between py-3 md:py-4 flex-wrap gap-3">
        <a href="index.html" class="header-logo flex items-center gap-3 cursor-pointer group">
          <img src="https://files.catbox.moe/4yfb2h.jpg" alt="Logo" class="h-10 w-10 rounded-full border-2 border-indigo-400 object-cover" />
          <span class="text-xl md:text-2xl font-bold tracking-wide glow-text">INFORMATION SAINTS</span>
        </a>
        <nav class="flex gap-4 text-sm md:text-base font-medium">
          <a href="index.html" class="hover:text-indigo-400 transition">Home</a>
          <a href="saints.html" class="hover:text-indigo-400 transition">Admin</a>
        </nav>
      </div>
    </header>

    <main class="flex-1 container-custom py-8">
      <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl md:text-4xl font-bold glow-text mb-6">⚙️ Admin Panel</h1>

        <div id="adminAlert" class="hidden p-4 rounded-xl mb-4"></div>

        <!-- FORM -->
        <div class="glass-card p-6 md:p-8 mb-8 fade-in">
          <h2 class="text-2xl font-bold mb-4" id="formTitle">➕ Add New Article</h2>
          <form id="newsForm" onsubmit="handleFormSubmit(event)" class="space-y-4">
            <input type="hidden" id="editId" />
            <div>
              <label class="block text-sm font-medium mb-1">Title *</label>
              <input type="text" id="formTitleInput" required class="form-input" placeholder="Article title..." />
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">Slug (URL)</label>
              <input type="text" id="formSlug" class="form-input" placeholder="auto-generated from title" />
              <p class="text-xs text-gray-500 mt-1">Leave blank to auto-generate</p>
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">Content *</label>
              <textarea id="formContent" rows="6" required class="form-input" placeholder="Write your article..."></textarea>
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">Excerpt (summary)</label>
              <textarea id="formExcerpt" rows="2" class="form-input" placeholder="Short summary (optional)"></textarea>
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">Image URL</label>
              <input type="url" id="formImage" class="form-input" placeholder="https://example.com/image.jpg" />
            </div>
            <div class="flex flex-wrap gap-3">
              <button type="submit" class="btn-primary" id="submitBtn">Publish Article</button>
              <button type="button" onclick="resetForm()" class="btn-secondary" id="cancelBtn" style="display:none;">Cancel</button>
            </div>
            <div id="formMessage" class="text-sm mt-2"></div>
          </form>
        </div>

        <!-- LIST -->
        <div class="fade-in fade-in-delay-2">
          <h2 class="text-2xl font-bold mb-4">📋 All Articles (<span id="newsCount">0</span>)</h2>
          <div id="newsList" class="space-y-3"></div>
        </div>
      </div>
    </main>

    <footer class="border-t border-white/5 py-6 mt-8 text-center text-sm text-gray-400">
      <div class="container-custom">
        <p>&copy; 2026 <span class="text-indigo-400 font-semibold">INFORMATION SAINTS</span> — Admin Panel</p>
      </div>
    </footer>
  </div>

  <script>
    // ==================== PARTICLES ====================
    (function initParticles() {
      const canvas = document.getElementById('particles-canvas');
      const ctx = canvas.getContext('2d');
      let width, height;
      let particles = [];
      const NUM = 120;

      function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      class Particle {
        constructor() {
          this.x = Math.random() * width;
          this.y = Math.random() * height;
          this.size = Math.random() * 2.2 + 0.5;
          this.speedX = (Math.random() - 0.5) * 0.4;
          this.speedY = (Math.random() - 0.5) * 0.4;
          this.opacity = Math.random() * 0.6 + 0.2;
        }
        update() {
          this.x += this.speedX;
          this.y += this.speedY;
          if (this.x < 0 || this.x > width) this.speedX *= -1;
          if (this.y < 0 || this.y > height) this.speedY *= -1;
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
          ctx.fill();
          ctx.shadowColor = 'rgba(79, 70, 229, 0.3)';
          ctx.shadowBlur = 8;
        }
      }

      for (let i = 0; i < NUM; i++) particles.push(new Particle());

      function drawLines() {
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 150) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(79, 70, 229, ${0.08 * (1 - dist / 150)})`;
              ctx.lineWidth = 0.6;
              ctx.stroke();
            }
          }
        }
      }

      function animate() {
        ctx.clearRect(0, 0, width, height);
        particles.forEach(p => { p.update(); p.draw(); });
        drawLines();
        requestAnimationFrame(animate);
      }
      animate();
    })();

    // ==================== DATA ====================
    const STORAGE_KEY = 'newsData';
    const DEFAULT_NEWS = [
      {
        id: '1',
        title: 'Welcome to INFORMATION SAINTS',
        slug: 'welcome-to-information-saints',
        content: 'This is the first article. Edit or delete it from the Admin panel. All data is stored locally in your browser.',
        excerpt: 'Welcome to INFORMATION SAINTS – your trusted news source.',
        image: 'https://files.catbox.moe/4yfb2h.jpg',
        createdAt: new Date().toISOString()
      }
    ];

    function getNews() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const data = JSON.parse(raw);
          if (Array.isArray(data) && data.length) return data;
        }
      } catch {}
      localStorage.setItem(STORAGE_KEY, JSON.stringify(DEFAULT_NEWS));
      return [...DEFAULT_NEWS];
    }

    function saveNews(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    // ==================== RENDER LIST ====================
    function renderList() {
      const news = getNews();
      const container = document.getElementById('newsList');
      const count = document.getElementById('newsCount');
      count.textContent = news.length;

      if (news.length === 0) {
        container.innerHTML = '<p class="text-gray-400">No articles yet.</p>';
        return;
      }

      container.innerHTML = news.map(item => `
        <div class="admin-item flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
          <div class="flex-1 min-w-0">
            <h3 class="font-semibold text-lg truncate">${item.title}</h3>
            <p class="text-sm text-gray-400 truncate">${item.excerpt || item.content.slice(0, 80)}</p>
            <p class="text-xs text-gray-500"><i class="far fa-calendar mr-1"></i>${formatDate(item.createdAt)}</p>
          </div>
          <div class="flex gap-2 flex-shrink-0">
            <button onclick="editNews('${item.id}')" class="text-indigo-400 hover:text-indigo-300 text-sm font-medium"><i class="fas fa-edit mr-1"></i>Edit</button>
            <button onclick="deleteNews('${item.id}')" class="text-red-400 hover:text-red-300 text-sm font-medium"><i class="fas fa-trash mr-1"></i>Delete</button>
          </div>
        </div>
      `).join('');
    }

    // ==================== CRUD ====================
    function generateSlug(title) {
      return title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
    }

    function formatDate(iso) {
      if (!iso) return '-';
      try {
        return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
      } catch { return iso; }
    }

    function showAdminMessage(msg, type) {
      const el = document.getElementById('adminAlert');
      if (!el) return;
      el.textContent = msg;
      el.className = `p-4 rounded-xl mb-4 ${type === 'success' ? 'bg-green-500/20 border border-green-400/30 text-green-300' : 'bg-red-500/20 border border-red-400/30 text-red-300'}`;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 4000);
    }

    function handleFormSubmit(e) {
      e.preventDefault();
      const id = document.getElementById('editId').value;
      const title = document.getElementById('formTitleInput').value.trim();
      const slugInput = document.getElementById('formSlug').value.trim();
      const content = document.getElementById('formContent').value.trim();
      const excerpt = document.getElementById('formExcerpt').value.trim();
      const image = document.getElementById('formImage').value.trim();

      if (!title || !content) {
        showAdminMessage('Title and content are required!', 'error');
        return;
      }

      const slug = slugInput || generateSlug(title);
      const news = getNews();

      if (news.some(n => n.slug === slug && n.id !== id)) {
        showAdminMessage('Slug already exists!', 'error');
        return;
      }

      const newItem = {
        title,
        slug,
        content,
        excerpt: excerpt || content.slice(0, 150),
        image: image || '',
        createdAt: new Date().toISOString()
      };

      if (id) {
        const idx = news.findIndex(n => n.id === id);
        if (idx !== -1) {
          news[idx] = { ...news[idx], ...newItem };
          saveNews(news);
          showAdminMessage('Article updated successfully!', 'success');
        } else {
          showAdminMessage('Article not found!', 'error');
        }
      } else {
        newItem.id = Date.now().toString();
        news.push(newItem);
        saveNews(news);
        showAdminMessage('Article published successfully!', 'success');
      }

      resetForm();
      renderList();
    }

    function editNews(id) {
      const news = getNews();
      const item = news.find(n => n.id === id);
      if (!item) return;

      document.getElementById('editId').value = item.id;
      document.getElementById('formTitleInput').value = item.title;
      document.getElementById('formSlug').value = item.slug || '';
      document.getElementById('formContent').value = item.content;
      document.getElementById('formExcerpt').value = item.excerpt || '';
      document.getElementById('formImage').value = item.image || '';
      document.getElementById('formTitle').textContent = '✏️ Edit Article';
      document.getElementById('submitBtn').textContent = 'Update Article';
      document.getElementById('cancelBtn').style.display = 'inline-block';
      document.getElementById('formMessage').textContent = '';
      // scroll to form
      document.querySelector('.glass-card').scrollIntoView({ behavior: 'smooth' });
    }

    function deleteNews(id) {
      if (!confirm('Are you sure you want to delete this article?')) return;
      let news = getNews();
      news = news.filter(n => n.id !== id);
      saveNews(news);
      renderList();
      showAdminMessage('Article deleted!', 'success');
    }

    function resetForm() {
      document.getElementById('editId').value = '';
      document.getElementById('formTitleInput').value = '';
      document.getElementById('formSlug').value = '';
      document.getElementById('formContent').value = '';
      document.getElementById('formExcerpt').value = '';
      document.getElementById('formImage').value = '';
      document.getElementById('formTitle').textContent = '➕ Add New Article';
      document.getElementById('submitBtn').textContent = 'Publish Article';
      document.getElementById('cancelBtn').style.display = 'none';
      document.getElementById('formMessage').textContent = '';
    }

    // ==================== INIT ====================
    document.addEventListener('DOMContentLoaded', () => {
      getNews();
      renderList();
    });

    // Expose global functions
    window.handleFormSubmit = handleFormSubmit;
    window.editNews = editNews;
    window.deleteNews = deleteNews;
    window.resetForm = resetForm;
  </script>
</body>
</html>
