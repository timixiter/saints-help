<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <title>Admin · INFORMATION SAINTS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <style>
    /* ===== RESET & BASE ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0b0e1a;
      color: #e5e9f0;
      overflow-x: hidden;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 8px; }

    #particles-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
      will-change: transform;
    }

    .app-wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .container-custom {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem;
      width: 100%;
    }

    /* ===== HEADER ===== */
    .header {
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      background: rgba(11, 14, 26, 0.65);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .header-logo {
      filter: drop-shadow(0 0 12px rgba(79, 70, 229, 0.25));
      transition: filter 0.3s;
    }
    .header-logo:hover { filter: drop-shadow(0 0 20px rgba(79, 70, 229, 0.5)); }
    .glow-text {
      text-shadow: 0 0 40px rgba(79, 70, 229, 0.2);
    }

    /* ===== GLASS CARD ===== */
    .glass-card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(12px) saturate(160%);
      -webkit-backdrop-filter: blur(12px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 1.5rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .glass-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(79, 70, 229, 0.12);
    }

    /* ===== FORM ===== */
    .form-input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 0.75rem;
      padding: 0.7rem 1rem;
      color: #e5e9f0;
      width: 100%;
      transition: all 0.3s;
      outline: none;
      font-family: inherit;
    }
    .form-input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
    }
    .form-input::placeholder {
      color: rgba(255,255,255,0.3);
    }

    .btn-primary {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
      border: none;
      padding: 0.6rem 1.8rem;
      border-radius: 9999px;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 16px rgba(79, 70, 229, 0.25);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .btn-primary:hover {
      transform: scale(1.04);
      box-shadow: 0 8px 32px rgba(79, 70, 229, 0.4);
    }
    .btn-primary:active { transform: scale(0.96); }

    .btn-secondary {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: #e5e9f0;
      padding: 0.6rem 1.8rem;
      border-radius: 9999px;
      font-weight: 500;
      transition: all 0.3s;
      cursor: pointer;
    }
    .btn-secondary:hover {
      background: rgba(79, 70, 229, 0.15);
      transform: scale(1.04);
    }

    .admin-item {
      background: rgba(255,255,255,0.03);
      border-radius: 1rem;
      padding: 1rem 1.2rem;
      border: 1px solid rgba(255,255,255,0.04);
      transition: all 0.3s;
    }
    .admin-item:hover {
      background: rgba(79, 70, 229, 0.06);
      border-color: rgba(79, 70, 229, 0.15);
    }

    /* ===== LOGIN OVERLAY ===== */
    #loginOverlay {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(11, 14, 26, 0.85);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    #loginOverlay.hidden { display: none; }
    .login-box {
      max-width: 400px;
      width: 100%;
      padding: 2rem 1.8rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 2rem;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
      text-align: center;
    }
    .login-box img {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid #4f46e5;
      object-fit: cover;
      margin-bottom: 1rem;
    }
    .login-box h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .login-box p { font-size: 0.9rem; color: #94a3b8; margin-bottom: 1.5rem; }
    .login-box .form-input { text-align: center; }
    .login-error {
      color: #f87171;
      font-size: 0.9rem;
      margin-top: 0.5rem;
      min-height: 1.5rem;
    }

    /* ===== ANIMATIONS ===== */
    .fade-in {
      animation: fadeInUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      opacity: 0;
    }
    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .container-custom { padding: 0 1rem; }
      .header .container-custom { flex-wrap: wrap; gap: 0.5rem; }
      .header-logo span { font-size: 1.1rem; }
      .header-logo img { height: 2.25rem; width: 2.25rem; }
      .login-box { padding: 1.5rem 1.2rem; }
      .glass-card { border-radius: 1.2rem; }
    }
    @media (max-width: 480px) {
      .header-logo span { font-size: 1rem; }
      .btn-primary { padding: 0.5rem 1.2rem; font-size: 0.9rem; }
    }

    @supports (padding: max(0px)) {
      .header { padding-top: max(0.75rem, env(safe-area-inset-top)); }
      footer { padding-bottom: max(0.5rem, env(safe-area-inset-bottom)); }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>

  <!-- ===== PARTICLE CANVAS ===== -->
  <canvas id="particles-canvas" aria-hidden="true"></canvas>

  <!-- ===== LOGIN OVERLAY ===== -->
  <div id="loginOverlay" role="dialog" aria-modal="true" aria-label="Admin Login">
    <div class="login-box fade-in">
      <img src="https://files.catbox.moe/4yfb2h.jpg" alt="Logo" width="72" height="72" loading="lazy" />
      <h2>Admin Access</h2>
      <p>Enter the password to continue</p>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <input type="password" id="passwordInput" class="form-input" placeholder="Enter password" required autofocus />
        <div id="loginError" class="login-error"></div>
        <button type="submit" class="btn-primary w-full justify-center mt-4">
          <i class="fas fa-lock"></i> Unlock
        </button>
      </form>
    </div>
  </div>

  <!-- ===== APP ===== -->
  <div class="app-wrapper" id="appWrapper" style="display:none;">
    <header class="header sticky top-0 z-50" role="banner">
      <div class="container-custom flex items-center justify-between py-3 md:py-4 flex-wrap gap-2">
        <a href="index.html" class="header-logo flex items-center gap-3 cursor-pointer group" aria-label="INFORMATION SAINTS Home">
          <img src="https://files.catbox.moe/4yfb2h.jpg" alt="Logo" class="h-10 w-10 rounded-full border-2 border-indigo-400 object-cover" width="40" height="40" loading="lazy" />
          <span class="text-xl md:text-2xl font-bold tracking-wide glow-text">INFORMATION SAINTS</span>
        </a>
        <nav class="flex gap-3 md:gap-4 text-sm md:text-base font-medium" aria-label="Navigation">
          <a href="index.html" class="hover:text-indigo-400 transition-colors">Home</a>
          <a href="saints.html" class="hover:text-indigo-400 transition-colors">Admin</a>
        </nav>
      </div>
    </header>

    <main class="flex-1 container-custom py-6 md:py-8" id="mainContent" role="main">
      <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl md:text-4xl font-bold glow-text mb-6">⚙️ Admin Panel</h1>

        <div id="adminAlert" class="hidden p-4 rounded-xl mb-4"></div>

        <!-- FORM -->
        <div class="glass-card p-5 md:p-8 mb-8 fade-in">
          <h2 class="text-2xl font-bold mb-4" id="formTitle">➕ Add New Article</h2>
          <form id="newsForm" onsubmit="handleFormSubmit(event)" class="space-y-4">
            <input type="hidden" id="editId" />
            <div>
              <label class="block text-sm font-medium mb-1">Title *</label>
              <input type="text" id="formTitleInput" required class="form-input" placeholder="Article title..." />
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">Slug (URL)</label>
              <input type="text" id="formSlug" class="form-input" placeholder="auto-generated from title" />
              <p class="text-xs text-gray-500 mt-1">Leave blank to auto-generate</p>
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">Content *</label>
              <textarea id="formContent" rows="6" required class="form-input" placeholder="Write your article..."></textarea>
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">Excerpt (summary)</label>
              <textarea id="formExcerpt" rows="2" class="form-input" placeholder="Short summary (optional)"></textarea>
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">Image URL</label>
              <input type="url" id="formImage" class="form-input" placeholder="https://example.com/image.jpg" />
            </div>
            <div class="flex flex-wrap gap-3">
              <button type="submit" class="btn-primary" id="submitBtn"><i class="fas fa-pen"></i> Publish</button>
              <button type="button" onclick="resetForm()" class="btn-secondary" id="cancelBtn" style="display:none;">Cancel</button>
            </div>
            <div id="formMessage" class="text-sm mt-2"></div>
          </form>
        </div>

        <!-- LIST -->
        <div class="fade-in fade-in-delay-2">
          <h2 class="text-2xl font-bold mb-4">📋 All Articles (<span id="newsCount">0</span>)</h2>
          <div id="newsList" class="space-y-3"></div>
        </div>
      </div>
    </main>

    <footer class="border-t border-white/5 py-5 mt-8 text-center text-xs md:text-sm text-gray-400" role="contentinfo">
      <div class="container-custom">
        <p>&copy; 2026 <span class="text-indigo-400 font-semibold">INFORMATION SAINTS</span> — Admin Panel</p>
      </div>
    </footer>
  </div>

  <!-- ============================================================ -->
  <!-- JAVASCRIPT - SEMUA LOGIKA (Ringan & Aman)                    -->
  <!-- ============================================================ -->
  <script>
    (function() {
      'use strict';

      // ==================== PARTICLES (sama seperti index) ====================
      function initParticles() {
        const canvas = document.getElementById('particles-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        const NUM = 80;

        function resize() {
          width = canvas.width = window.innerWidth;
          height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
          constructor() {
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            this.size = Math.random() * 2 + 0.8;
            this.speedX = (Math.random() - 0.5) * 0.3;
            this.speedY = (Math.random() - 0.5) * 0.3;
            this.opacity = Math.random() * 0.4 + 0.15;
          }
          update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x < 0 || this.x > width) this.speedX *= -1;
            if (this.y < 0 || this.y > height) this.speedY *= -1;
          }
          draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
            ctx.fill();
            if (this.size > 1.5) {
              ctx.shadowColor = 'rgba(79, 70, 229, 0.15)';
              ctx.shadowBlur = 6;
            }
          }
        }

        for (let i = 0; i < NUM; i++) particles.push(new Particle());

        function drawLines() {
          for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
              const dx = particles[i].x - particles[j].x;
              const dy = particles[i].y - particles[j].y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < 130) {
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.strokeStyle = `rgba(79, 70, 229, ${0.06 * (1 - dist / 130)})`;
                ctx.lineWidth = 0.5;
                ctx.stroke();
              }
            }
          }
        }

        function animate() {
          ctx.clearRect(0, 0, width, height);
          particles.forEach(p => { p.update(); p.draw(); });
          drawLines();
          requestAnimationFrame(animate);
        }
        animate();
      }

      // ==================== DATA ====================
      const STORAGE_KEY = 'newsData';
      const DEFAULT_NEWS = [
        {
          id: '1',
          title: 'Welcome to INFORMATION SAINTS',
          slug: 'welcome-to-information-saints',
          content: 'This is the first article. Edit or delete it from the Admin panel. All data is stored locally in your browser.',
          excerpt: 'Welcome to INFORMATION SAINTS – your trusted news source.',
          image: 'https://files.catbox.moe/4yfb2h.jpg',
          createdAt: new Date().toISOString()
        }
      ];

      function getNews() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) {
            const data = JSON.parse(raw);
            if (Array.isArray(data) && data.length) return data;
          }
        } catch (_) {}
        localStorage.setItem(STORAGE_KEY, JSON.stringify(DEFAULT_NEWS));
        return [...DEFAULT_NEWS];
      }

      function saveNews(data) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }

      // ==================== LOGIN ====================
      const CORRECT_PASSWORD = 'SAINST X MIWATEAM';

      function handleLogin(e) {
        e.preventDefault();
        const input = document.getElementById('passwordInput');
        const error = document.getElementById('loginError');
        const entered = input.value.trim();

        if (entered === CORRECT_PASSWORD) {
          // Login sukses
          document.getElementById('loginOverlay').classList.add('hidden');
          document.getElementById('appWrapper').style.display = 'flex';
          error.textContent = '';
          input.value = '';
          // Load data
          renderList();
          initParticles();
        } else {
          error.textContent = '❌ Incorrect password. Please try again.';
          input.value = '';
          input.focus();
        }
      }

      // ==================== RENDER LIST ====================
      function renderList() {
        const news = getNews();
        const container = document.getElementById('newsList');
        const count = document.getElementById('newsCount');
        if (!container || !count) return;

        count.textContent = news.length;

        if (news.length === 0) {
          container.innerHTML = '<p class="text-gray-400">No articles yet.</p>';
          return;
        }

        container.innerHTML = news.map(item => `
          <div class="admin-item flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
            <div class="flex-1 min-w-0">
              <h3 class="font-semibold text-lg truncate">${item.title}</h3>
              <p class="text-sm text-gray-400 truncate">${item.excerpt || item.content.slice(0, 80)}</p>
              <p class="text-xs text-gray-500"><i class="far fa-calendar mr-1"></i>${formatDate(item.createdAt)}</p>
            </div>
            <div class="flex gap-2 flex-shrink-0">
              <button onclick="editNews('${item.id}')" class="text-indigo-400 hover:text-indigo-300 text-sm font-medium"><i class="fas fa-edit mr-1"></i>Edit</button>
              <button onclick="deleteNews('${item.id}')" class="text-red-400 hover:text-red-300 text-sm font-medium"><i class="fas fa-trash mr-1"></i>Delete</button>
            </div>
          </div>
        `).join('');
      }

      // ==================== CRUD ====================
      function generateSlug(title) {
        return title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
      }

      function formatDate(iso) {
        if (!iso) return '-';
        try {
          return new Date(iso).toLocaleDateString('en-US', {
            year: 'numeric',
            month: 'short',
            day: 'numeric'
          });
        } catch (_) { return iso; }
      }

      function showAdminMessage(msg, type) {
        const el = document.getElementById('adminAlert');
        if (!el) return;
        el.textContent = msg;
        el.className = `p-4 rounded-xl mb-4 ${type === 'success' ? 'bg-green-500/20 border border-green-400/30 text-green-300' : 'bg-red-500/20 border border-red-400/30 text-red-300'}`;
        el.classList.remove('hidden');
        setTimeout(() => el.classList.add('hidden'), 4000);
      }

      function handleFormSubmit(e) {
        e.preventDefault();
        const id = document.getElementById('editId').value;
        const title = document.getElementById('formTitleInput').value.trim();
        const slugInput = document.getElementById('formSlug').value.trim();
        const content = document.getElementById('formContent').value.trim();
        const excerpt = document.getElementById('formExcerpt').value.trim();
        const image = document.getElementById('formImage').value.trim();

        if (!title || !content) {
          showAdminMessage('Title and content are required!', 'error');
          return;
        }

        const slug = slugInput || generateSlug(title);
        const news = getNews();

        if (news.some(n => n.slug === slug && n.id !== id)) {
          showAdminMessage('Slug already exists!', 'error');
          return;
        }

        const newItem = {
          title,
          slug,
          content,
          excerpt: excerpt || content.slice(0, 150),
          image: image || '',
          createdAt: new Date().toISOString()
        };

        if (id) {
          const idx = news.findIndex(n => n.id === id);
          if (idx !== -1) {
            news[idx] = { ...news[idx], ...newItem };
            saveNews(news);
            showAdminMessage('Article updated successfully!', 'success');
          } else {
            showAdminMessage('Article not found!', 'error');
          }
        } else {
          newItem.id = Date.now().toString();
          news.push(newItem);
          saveNews(news);
          showAdminMessage('Article published successfully!', 'success');
        }

        resetForm();
        renderList();
      }

      function editNews(id) {
        const news = getNews();
        const item = news.find(n => n.id === id);
        if (!item) return;

        document.getElementById('editId').value = item.id;
        document.getElementById('formTitleInput').value = item.title;
        document.getElementById('formSlug').value = item.slug || '';
        document.getElementById('formContent').value = item.content;
        document.getElementById('formExcerpt').value = item.excerpt || '';
        document.getElementById('formImage').value = item.image || '';
        document.getElementById('formTitle').textContent = '✏️ Edit Article';
        document.getElementById('submitBtn').innerHTML = '<i class="fas fa-save"></i> Update';
        document.getElementById('cancelBtn').style.display = 'inline-block';
        document.getElementById('formMessage').textContent = '';
        document.querySelector('.glass-card').scrollIntoView({ behavior: 'smooth' });
      }

      function deleteNews(id) {
        if (!confirm('Are you sure you want to delete this article?')) return;
        let news = getNews();
        news = news.filter(n => n.id !== id);
        saveNews(news);
        renderList();
        showAdminMessage('Article deleted!', 'success');
      }

      function resetForm() {
        document.getElementById('editId').value = '';
        document.getElementById('formTitleInput').value = '';
        document.getElementById('formSlug').value = '';
        document.getElementById('formContent').value = '';
        document.getElementById('formExcerpt').value = '';
        document.getElementById('formImage').value = '';
        document.getElementById('formTitle').textContent = '➕ Add New Article';
        document.getElementById('submitBtn').innerHTML = '<i class="fas fa-pen"></i> Publish';
        document.getElementById('cancelBtn').style.display = 'none';
        document.getElementById('formMessage').textContent = '';
      }

      // ==================== INIT ====================
      // Expose functions globally for inline onclick
      window.handleLogin = handleLogin;
      window.handleFormSubmit = handleFormSubmit;
      window.editNews = editNews;
      window.deleteNews = deleteNews;
      window.resetForm = resetForm;

      // Saat halaman dimuat, tampilkan login overlay, app disembunyikan
      document.addEventListener('DOMContentLoaded', () => {
        // Pastikan overlay visible
        document.getElementById('loginOverlay').classList.remove('hidden');
        document.getElementById('appWrapper').style.display = 'none';
        // Inisialisasi particles di background overlay
        initParticles();
        // Preload data
        getNews();
        // Fokus ke input password
        document.getElementById('passwordInput').focus();
      });

    })();
  </script>
</body>
</html>
