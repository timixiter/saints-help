<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <meta name="theme-color" content="#0b0e1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Admin · INFORMATION SAINTS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       GLOBAL RESET
       ============================================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html {
      -webkit-text-size-adjust: 100%;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0b0e1a;
      color: #e5e9f0;
      overflow-x: hidden;
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      touch-action: manipulation;
    }
    ::-webkit-scrollbar {
      width: 5px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
    }
    ::-webkit-scrollbar-thumb {
      background: #4f46e5;
      border-radius: 10px;
    }

    /* ============================================================
       PARTICLES
       ============================================================ */
    #particles-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      z-index: 0;
      pointer-events: none;
    }

    .app-wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    .container-custom {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.25rem;
      width: 100%;
    }
    @media (max-width: 480px) {
      .container-custom {
        padding: 0 0.9rem;
      }
    }

    /* ============================================================
       HEADER
       ============================================================ */
    .header {
      backdrop-filter: blur(18px) saturate(1.2);
      -webkit-backdrop-filter: blur(18px) saturate(1.2);
      background: rgba(11, 14, 26, 0.6);
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    .header-logo {
      filter: drop-shadow(0 0 16px rgba(79, 70, 229, 0.25));
      transition: filter 0.3s;
      flex-shrink: 0;
    }
    .header-logo:hover {
      filter: drop-shadow(0 0 28px rgba(79, 70, 229, 0.5));
    }
    .header-logo img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid rgba(79, 70, 229, 0.4);
      object-fit: cover;
      flex-shrink: 0;
    }
    .glow-text {
      text-shadow: 0 0 40px rgba(79, 70, 229, 0.2);
    }
    @media (max-width: 480px) {
      .header-logo img {
        width: 34px;
        height: 34px;
      }
      .header-logo span {
        font-size: 1.05rem;
      }
    }

    /* ============================================================
       GLASS CARD
       ============================================================ */
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 1.5rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.35s ease;
    }
    .glass-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(79, 70, 229, 0.08);
    }

    /* ============================================================
       FORM
       ============================================================ */
    .form-input {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 0.75rem;
      padding: 0.7rem 1rem;
      color: #e5e9f0;
      width: 100%;
      transition: all 0.3s;
      outline: none;
      font-family: inherit;
      font-size: 0.95rem;
    }
    .form-input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }
    .form-input::placeholder {
      color: rgba(255, 255, 255, 0.2);
    }

    /* ============================================================
       GLOWING BUTTON (sama)
       ============================================================ */
    .glowing-btn-wrapper {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      padding: 0;
      cursor: pointer;
      outline: none;
      user-select: none;
      text-decoration: none;
      box-sizing: border-box;
      transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
      overflow: visible;
      font-family: inherit;
    }
    .glowing-btn-wrapper:hover:not(:disabled) {
      transform: scale(1.025);
    }
    .glowing-btn-wrapper:active:not(:disabled) {
      transform: scale(0.97);
    }
    .glowing-btn-wrapper:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    .glowing-btn-border-track {
      position: absolute;
      inset: 0;
      padding: 1.5px;
      overflow: hidden;
      z-index: 1;
      pointer-events: none;
    }
    .shape-pill,
    .shape-pill .glowing-btn-border-track,
    .shape-pill .glowing-btn-content,
    .shape-pill .glowing-btn-glow-layer {
      border-radius: 9999px;
    }
    .shape-rounded,
    .shape-rounded .glowing-btn-border-track,
    .shape-rounded .glowing-btn-glow-layer {
      border-radius: 12px;
    }
    .shape-rounded .glowing-btn-content {
      border-radius: 10.5px;
    }

    .glowing-btn-spinner {
      position: absolute;
      top: -150%;
      left: -150%;
      width: 400%;
      height: 400%;
      transform-origin: center;
    }
    @keyframes glowing-btn-spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }
    .speed-slow .glowing-btn-spinner {
      animation: glowing-btn-spin 8s linear infinite;
    }
    .speed-normal .glowing-btn-spinner {
      animation: glowing-btn-spin 4s linear infinite;
    }
    .speed-fast .glowing-btn-spinner {
      animation: glowing-btn-spin 1.8s linear infinite;
    }

    .preset-aurora .glowing-btn-spinner {
      background: conic-gradient(from 0deg, transparent 0deg, #3b82f6 60deg, #d946ef 120deg, #8b5cf6 180deg, #06b6d4 240deg, #3b82f6 300deg, transparent 360deg);
    }
    .preset-cyber .glowing-btn-spinner {
      background: conic-gradient(from 0deg, transparent 0deg, #10b981 30deg, transparent 70deg, transparent 180deg, #06b6d4 210deg, transparent 250deg, transparent 360deg);
    }
    .preset-ember .glowing-btn-spinner {
      background: conic-gradient(from 0deg, transparent 0deg, #f97316 45deg, #ef4444 135deg, #eab308 225deg, #f97316 315deg, transparent 360deg);
    }
    .preset-glass .glowing-btn-spinner {
      background: conic-gradient(from 0deg, transparent 0deg, rgba(255, 255, 255, 0.05) 90deg, rgba(255, 255, 255, 0.7) 180deg, rgba(255, 255, 255, 0.05) 270deg, rgba(255, 255, 255, 0.7) 360deg);
    }

    .glowing-btn-glow-layer {
      position: absolute;
      inset: -2px;
      z-index: 0;
      pointer-events: none;
      transition: opacity 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      overflow: hidden;
    }
    .glow-none {
      display: none;
    }
    .glow-low {
      filter: blur(8px);
      opacity: 0.35;
    }
    .glow-medium {
      filter: blur(16px);
      opacity: 0.6;
    }
    .glow-high {
      filter: blur(28px);
      opacity: 0.85;
    }
    .glowing-btn-wrapper:hover:not(:disabled) .glow-low {
      opacity: 0.65;
    }
    .glowing-btn-wrapper:hover:not(:disabled) .glow-medium {
      opacity: 0.85;
    }
    .glowing-btn-wrapper:hover:not(:disabled) .glow-high {
      opacity: 1;
    }

    .glowing-btn-content {
      position: relative;
      z-index: 2;
      margin: 1.5px;
      padding: 12px 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      color: #ffffff;
      background: #09090b;
      transition: background 0.3s ease, color 0.3s ease;
    }
    .preset-glass .glowing-btn-content {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .glowing-btn-wrapper:hover:not(:disabled) .glowing-btn-content {
      background: #121215;
    }
    .preset-glass.glowing-btn-wrapper:hover:not(:disabled) .glowing-btn-content {
      background: rgba(255, 255, 255, 0.07);
    }

    .glowing-btn-wrapper:focus-visible {
      box-shadow: 0 0 0 3px #000, 0 0 0 5px rgba(255, 255, 255, 0.55);
    }
    .glowing-btn-wrapper:disabled .glowing-btn-border-track {
      background: rgba(255, 255, 255, 0.05) !important;
    }
    .glowing-btn-wrapper:disabled .glowing-btn-spinner {
      display: none !important;
    }
    .glowing-btn-wrapper:disabled .glowing-btn-glow-layer {
      display: none !important;
    }
    .glowing-btn-wrapper:disabled .glowing-btn-content {
      background: rgba(255, 255, 255, 0.02) !important;
      color: rgba(255, 255, 255, 0.2) !important;
    }

    /* ============================================================
       ADMIN ITEMS
       ============================================================ */
    .admin-item {
      background: rgba(255, 255, 255, 0.025);
      border-radius: 1rem;
      padding: 0.8rem 1rem;
      border: 1px solid rgba(255, 255, 255, 0.03);
      transition: all 0.3s ease;
    }
    .admin-item:hover {
      background: rgba(79, 70, 229, 0.04);
      border-color: rgba(79, 70, 229, 0.08);
    }
    .admin-item .item-title {
      font-weight: 600;
      font-size: 1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .admin-item .item-excerpt {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ============================================================
       LOGIN
       ============================================================ */
    .login-box {
      max-width: 400px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
    }
    .login-box h1 {
      font-size: 1.8rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 0.3rem;
    }
    .login-box .sub {
      text-align: center;
      color: rgba(255, 255, 255, 0.25);
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }
    .login-error {
      color: #f87171;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 0.8rem;
      display: none;
    }

    /* ============================================================
       THEME CUSTOMIZER
       ============================================================ */
    .theme-customizer {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 1.2rem;
      padding: 1.5rem;
      margin-top: 1.5rem;
    }
    .theme-customizer-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 1rem;
    }
    .theme-customizer-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      align-items: center;
    }
    .theme-customizer-group {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .theme-customizer-group label {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.3);
      font-weight: 500;
    }
    .theme-customizer-group input[type="color"] {
      width: 36px;
      height: 36px;
      border: 2px solid rgba(255, 255, 255, 0.06);
      border-radius: 50%;
      padding: 2px;
      cursor: pointer;
      background: transparent;
      transition: border-color 0.3s;
    }
    .theme-customizer-group input[type="color"]:hover {
      border-color: rgba(255, 255, 255, 0.15);
    }
    .theme-customizer-group input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 0;
    }
    .theme-customizer-group input[type="color"]::-webkit-color-swatch {
      border: none;
      border-radius: 50%;
    }
    .theme-preset-btn {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 9999px;
      padding: 0.3rem 1rem;
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
    }
    .theme-preset-btn:hover {
      background: rgba(79, 70, 229, 0.08);
      border-color: rgba(79, 70, 229, 0.15);
      color: #fff;
    }
    .theme-preset-btn.active {
      background: rgba(79, 70, 229, 0.12);
      border-color: rgba(79, 70, 229, 0.2);
      color: #a78bfa;
    }

    /* ============================================================
       UTILITY
       ============================================================ */
    .fade-in {
      animation: fadeInUp 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      opacity: 0;
    }
    @keyframes fadeInUp {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .footer {
      border-top: 1px solid rgba(255, 255, 255, 0.03);
      padding: 1.5rem 0;
      margin-top: 2.5rem;
      text-align: center;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.15);
    }
    .footer span {
      color: rgba(79, 70, 229, 0.4);
      font-weight: 600;
    }

    .alert {
      padding: 0.9rem 1.2rem;
      border-radius: 1rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    .alert-success {
      background: rgba(34, 197, 94, 0.08);
      border: 1px solid rgba(34, 197, 94, 0.12);
      color: #4ade80;
    }
    .alert-error {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.12);
      color: #f87171;
    }

    @supports (padding: max(0px)) {
      .header {
        padding-top: max(0.75rem, env(safe-area-inset-top));
      }
      .app-wrapper {
        padding-bottom: env(safe-area-inset-bottom);
      }
    }

    @media (max-width: 480px) {
      .login-box {
        padding: 2rem 1.2rem;
      }
      .admin-item {
        flex-direction: column;
        align-items: flex-start !important;
        gap: 0.5rem;
      }
      .admin-item .actions {
        align-self: flex-end;
      }
    }
  </style>
</head>

  <script>
    // ================================================================
    // 1. PARTICLES
    // ================================================================
    (function initParticles() {
      var canvas = document.getElementById('particles-canvas');
      var ctx = canvas.getContext('2d');
      var width, height;
      var particles = [];
      var NUM = 90;
      var animId;

      function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      function Particle() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.size = Math.random() * 2 + 0.3;
        this.speedX = (Math.random() - 0.5) * 0.3;
        this.speedY = (Math.random() - 0.5) * 0.3;
        this.opacity = Math.random() * 0.5 + 0.15;
      }

      Particle.prototype.update = function() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > width) this.speedX *= -1;
        if (this.y < 0 || this.y > height) this.speedY *= -1;
      };

      Particle.prototype.draw = function() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,' + this.opacity + ')';
        ctx.fill();
        ctx.shadowColor = 'rgba(79,70,229,0.15)';
        ctx.shadowBlur = 5;
      };

      for (var i = 0; i < NUM; i++) {
        particles.push(new Particle());
      }

      function drawLines() {
        for (var i = 0; i < particles.length; i++) {
          for (var j = i + 1; j < particles.length; j++) {
            var dx = particles[i].x - particles[j].x;
            var dy = particles[i].y - particles[j].y;
            var dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 130) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = 'rgba(79,70,229,' + (0.05 * (1 - dist / 130)) + ')';
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
        }
      }

      function animate() {
        ctx.clearRect(0, 0, width, height);
        for (var i = 0; i < particles.length; i++) {
          particles[i].update();
          particles[i].draw();
        }
        drawLines();
        animId = requestAnimationFrame(animate);
      }
      animate();

      window.addEventListener('beforeunload', function() {
        if (animId) cancelAnimationFrame(animId);
      });
    })();

    // ================================================================
    // 2. DATA
    // ================================================================
    var STORAGE_KEY = 'newsData';
    var SESSION_KEY = 'adminSession';
    var PASSWORD = 'SAINST X MIWATEAM';
    var DEFAULT_NEWS = [{
      id: '1',
      title: 'Welcome to INFORMATION SAINTS',
      slug: 'welcome-to-information-saints',
      content: 'This is the first article. Edit or delete it from the Admin panel.\n\nAll data is stored locally in your browser using localStorage.',
      excerpt: 'Welcome to INFORMATION SAINTS – your trusted news source.',
      image: 'https://files.catbox.moe/4yfb2h.jpg',
      createdAt: new Date().toISOString()
    }];

    function getNews() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          var data = JSON.parse(raw);
          if (Array.isArray(data) && data.length) return data;
        }
      } catch (e) {}
      localStorage.setItem(STORAGE_KEY, JSON.stringify(DEFAULT_NEWS));
      return DEFAULT_NEWS.slice();
    }

    function saveNews(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function isAuthenticated() {
      return localStorage.getItem(SESSION_KEY) === 'true';
    }

    function setAuthenticated(val) {
      localStorage.setItem(SESSION_KEY, val ? 'true' : 'false');
    }

    function logout() {
      setAuthenticated(false);
      renderApp();
    }

    // ================================================================
    // 3. RENDER
    // ================================================================
    function renderApp() {
      var container = document.getElementById('mainContent');
      if (!isAuthenticated()) {
        renderLogin(container);
      } else {
        renderAdmin(container);
      }
    }

    // ================================================================
    // 4. LOGIN
    // ================================================================
    function renderLogin(container) {
      container.innerHTML =
        '<div class="fade-in">' +
        '  <div class="login-box glass-card">' +
        '    <h1>🔐 Admin Access</h1>' +
        '    <p class="sub">Enter the password to manage articles</p>' +
        '    <form id="loginForm" onsubmit="handleLogin(event)">' +
        '      <div class="mb-4">' +
        '        <input type="password" id="passwordInput" class="form-input" placeholder="Enter password..." autofocus />' +
        '      </div>' +
        '      <button type="submit" class="glowing-btn-wrapper shape-pill speed-normal preset-cyber glow-medium w-full justify-center">' +
        '        <div class="glowing-btn-glow-layer glow-medium"><div class="glowing-btn-spinner"></div></div>' +
        '        <div class="glowing-btn-border-track"><div class="glowing-btn-spinner"></div></div>' +
        '        <span class="glowing-btn-content"><i class="fas fa-unlock mr-2"></i> Unlock</span>' +
        '      </button>' +
        '      <div id="loginError" class="login-error">Incorrect password. Try again.</div>' +
        '    </form>' +
        '  </div>' +
        '</div>';
    }

    function handleLogin(e) {
      e.preventDefault();
      var input = document.getElementById('passwordInput');
      var error = document.getElementById('loginError');
      if (input.value === PASSWORD) {
        setAuthenticated(true);
        renderApp();
      } else {
        error.style.display = 'block';
        input.value = '';
        input.focus();
        setTimeout(function() { error.style.display = 'none'; }, 3000);
      }
    }

    // ================================================================
    // 5. ADMIN
    // ================================================================
    function renderAdmin(container) {
      var news = getNews();

      html += '      <button class="glowing-btn-wrapper shape-pill speed-normal preset-aurora glow-low" onclick="applyTheme()">';
      html += '        <div class="glowing-btn-glow-layer glow-low"><div class="glowing-btn-spinner"></div></div>';
      html += '        <div class="glowing-btn-border-track"><div class="glowing-btn-spinner"></div></div>';
      html += '        <span class="glowing-btn-content"><i class="fas fa-check mr-2"></i> Apply Theme</span>';

        '      <button class="glowing-btn-wrapper shape-pill speed-normal preset-glass glow-none" onclick="resetTheme()">';
      html += '        <div class="glowing-btn-border-track"><div class="glowing-btn-spinner"></div></div>';

      html += '</div>';

      container.innerHTML = html;

      // Init Theme Customizer
      initThemeCustomizer();
    }

    // ================================================================
    // 6. CRUD
    // ================================================================
    function generateSlug(title) {
      return title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
    }

    function formatDate(iso) {
      if (!iso) return '-';
      try {
        var d = new Date(iso);
        return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
      } catch (e) { return iso; }
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function showAlert(msg, type) {
      var el = document.getElementById('adminAlert');
      if (!el) return;
      el.textContent = msg;
      el.className = 'alert alert-' + type;
      el.style.display = 'block';
      setTimeout(function() { el.style.display = 'none'; }, 4000);
    }

    function handleFormSubmit(e) {
      e.preventDefault();
      var id = document.getElementById('editId').value;
      var title = document.getElementById('formTitleInput').value.trim();
      var slugInput = document.getElementById('formSlug').value.trim();
      var content = document.getElementById('formContent').value.trim();
      var excerpt = document.getElementById('formExcerpt').value.trim();
      var image = document.getElementById('formImage').value.trim();

      if (!title || !content) {
        showAlert('Title and content are required!', 'error');
        return;
      }

      var slug = slugInput || generateSlug(title);
      var news = getNews();

      var duplicate = false;
      for (var i = 0; i < news.length; i++) {
        if (news[i].slug === slug && news[i].id !== id) {
          duplicate = true;
          break;
        }
      }
      if (duplicate) {
        showAlert('Slug already exists!', 'error');
        return;
      }

      var newItem = {
        title: title,
        slug: slug,
        content: content,
        excerpt: excerpt || content.slice(0, 150),
        image: image || '',
        createdAt: new Date().toISOString()
      };

      if (id) {
        var idx = -1;
        for (var j = 0; j < news.length; j++) {
          if (news[j].id === id) { idx = j; break; }
        }
        if (idx !== -1) {
          news[idx] = { ...news[idx], ...newItem };
          saveNews(news);
          showAlert('Article updated successfully!', 'success');
        } else {
          showAlert('Article not found!', 'error');
        }
      } else {
        newItem.id = Date.now().toString();
        news.push(newItem);
        saveNews(news);
        showAlert('Article published successfully!', 'success');
      }

      resetForm();
      renderAdmin(document.getElementById('mainContent'));
    }

    function editNews(id) {
      var news = getNews();
      var item = null;
      for (var i = 0; i < news.length; i++) {
        if (news[i].id === id) { item = news[i]; break; }
      }
      if (!item) return;

      document.getElementById('editId').value = item.id;
      document.getElementById('formTitleInput').value = item.title;
      document.getElementById('formSlug').value = item.slug || '';
      document.getElementById('formContent').value = item.content;
      document.getElementById('formExcerpt').value = item.excerpt || '';
      document.getElementById('formImage').value = item.image || '';
      document.getElementById('formTitle').textContent = '✏️ Edit Article';

      var submitBtn = document.getElementById('submitBtn');
      submitBtn.querySelector('.glowing-btn-content').innerHTML = '<i class="fas fa-sync mr-2"></i> Update Article';
      submitBtn.className = 'glowing-btn-wrapper shape-pill speed-normal preset-cyber glow-medium';

      document.getElementById('cancelBtn').style.display = 'inline-flex';
      document.getElementById('formMessage').textContent = '';
      document.querySelector('.glass-card').scrollIntoView({ behavior: 'smooth' });
    }

    function deleteNews(id) {
      if (!confirm('Are you sure you want to delete this article?')) return;
      var news = getNews();
      var filtered = [];
      for (var i = 0; i < news.length; i++) {
        if (news[i].id !== id) filtered.push(news[i]);
      }
      saveNews(filtered);
      renderAdmin(document.getElementById('mainContent'));
      showAlert('Article deleted!', 'success');
    }

    function resetForm() {
      document.getElementById('editId').value = '';
      document.getElementById('formTitleInput').value = '';
      document.getElementById('formSlug').value = '';
      document.getElementById('formContent').value = '';
      document.getElementById('formExcerpt').value = '';
      document.getElementById('formImage').value = '';
      document.getElementById('formTitle').textContent = '➕ Add New Article';

      var submitBtn = document.getElementById('submitBtn');
      submitBtn.querySelector('.glowing-btn-content').innerHTML = '<i class="fas fa-paper-plane mr-2"></i> Publish Article';
      submitBtn.className = 'glowing-btn-wrapper shape-pill speed-normal preset-aurora glow-medium';

      document.getElementById('cancelBtn').style.display = 'none';
      document.getElementById('formMessage').textContent = '';
    }

    // ================================================================
    // 7. THEME CUSTOMIZER
    // ================================================================
    function initThemeCustomizer() {
      var primaryInput = document.getElementById('themePrimary');
      var secondaryInput = document.getElementById('themeSecondary');
      var accentInput = document.getElementById('themeAccent');
      var presetBtns = document.querySelectorAll('.theme-preset-btn');

      var savedTheme = localStorage.getItem('themeColors');
      if (savedTheme) {
        try {
          var colors = JSON.parse(savedTheme);
          if (primaryInput) primaryInput.value = colors.primary || '#4f46e5';
          if (secondaryInput) secondaryInput.value = colors.secondary || '#7c3aed';
          if (accentInput) accentInput.value = colors.accent || '#06b6d4';
        } catch (e) {}
      }

      var presets = {
        default: { primary: '#4f46e5', secondary: '#7c3aed', accent: '#06b6d4' },
        ocean: { primary: '#0ea5e9', secondary: '#0284c7', accent: '#22d3ee' },
        sunset: { primary: '#f97316', secondary: '#ef4444', accent: '#eab308' },
        forest: { primary: '#22c55e', secondary: '#16a34a', accent: '#84cc16' }
      };

      for (var i = 0; i < presetBtns.length; i++) {
        (function(btn) {
          btn.addEventListener('click', function() {
            var preset = btn.dataset.preset;
            var colors = presets[preset];
            if (colors && primaryInput && secondaryInput && accentInput) {
              primaryInput.value = colors.primary;
              secondaryInput.value = colors.secondary;
              accentInput.value = colors.accent;
              for (var k = 0; k < presetBtns.length; k++) {
                presetBtns[k].classList.remove('active');
              }
              btn.classList.add('active');
              applyTheme();
            }
          });
        })(presetBtns[i]);
      }

      if (primaryInput) primaryInput.addEventListener('input', function() { applyTheme(); });
      if (secondaryInput) secondaryInput.addEventListener('input', function() { applyTheme(); });
      if (accentInput) accentInput.addEventListener('input', function() { applyTheme(); });
    }

    function applyTheme() {
      var primary = document.getElementById('themePrimary')?.value || '#4f46e5';
      var secondary = document.getElementById('themeSecondary')?.value || '#7c3aed';
      var accent = document.getElementById('themeAccent')?.value || '#06b6d4';

      localStorage.setItem('themeColors', JSON.stringify({ primary: primary, secondary: secondary, accent: accent }));

      // Update semua elemen dengan gradient
      var elements = document.querySelectorAll(
        '.glowing-btn-content, .glowing-btn-spinner, .fluid-switch-indicator, .profile-cover, .btn-primary, .theme-preset-btn.active'
        );
      for (var i = 0; i < elements.length; i++) {
        var el = elements[i];
        if (el.classList.contains('glowing-btn-content')) {
          el.style.background = 'linear-gradient(135deg, ' + primary + ', ' + secondary + ')';
        }
        if (el.classList.contains('glowing-btn-spinner')) {
          el.style.background = 'conic-gradient(from 0deg, transparent 0deg, ' + primary + ' 60deg, ' + secondary +
            ' 120deg, ' + accent + ' 180deg, ' + primary + ' 300deg, transparent 360deg)';
        }
        if (el.classList.contains('fluid-switch-indicator')) {
          el.style.background = 'linear-gradient(135deg, ' + primary + ', ' + secondary + ')';
        }
        if (el.classList.contains('profile-cover')) {
          el.style.background = 'linear-gradient(135deg, ' + primary + ', ' + secondary + ', ' + accent + ')';
        }
        if (el.classList.contains('theme-preset-btn') && el.classList.contains('active')) {
          el.style.background = 'rgba(' + hexToRgb(primary) + ', 0.12)';
          el.style.borderColor = primary;
        }
      }

      // Border pada input focus
      var focusedInputs = document.querySelectorAll('.search-input-box.focused, .exp-search-pill.expanded');
      for (var j = 0; j < focusedInputs.length; j++) {
        focusedInputs[j].style.borderColor = primary;
      }

      showAlert('Theme applied successfully!', 'success');
    }

    function hexToRgb(hex) {
      var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? parseInt(result[1], 16) + ',' + parseInt(result[2], 16) + ',' + parseInt(result[3], 16) : '79,70,229';
    }

    function resetTheme() {
      localStorage.removeItem('themeColors');
      var primaryInput = document.getElementById('themePrimary');
      var secondaryInput = document.getElementById('themeSecondary');
      var accentInput = document.getElementById('themeAccent');
      if (primaryInput) primaryInput.value = '#4f46e5';
      if (secondaryInput) secondaryInput.value = '#7c3aed';
      if (accentInput) accentInput.value = '#06b6d4';
      // Reset all preset buttons
      var presetBtns = document.querySelectorAll('.theme-preset-btn');
      for (var i = 0; i < presetBtns.length; i++) {
        presetBtns[i].classList.remove('active');
        if (presetBtns[i].dataset.preset === 'default') {
          presetBtns[i].classList.add('active');
        }
      }
      applyTheme();
      showAlert('Theme reset to default!', 'success');
    }

    // ================================================================
    // 8. INIT
    // ================================================================
    document.addEventListener('DOMContentLoaded', function() {
      getNews();
      renderApp();
    });

    // Expose
    window.handleLogin = handleLogin;
    window.handleFormSubmit = handleFormSubmit;
    window.editNews = editNews;
    window.deleteNews = deleteNews;
    window.resetForm = resetForm;
    window.logout = logout;
    window.applyTheme = applyTheme;
    window.resetTheme = resetTheme;
  </script>
