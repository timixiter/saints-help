<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <meta name="theme-color" content="#0b0e1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>INFORMATION SAINTS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       GLOBAL RESET & BASE
       ============================================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html {
      -webkit-text-size-adjust: 100%;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0b0e1a;
      color: #e5e9f0;
      overflow-x: hidden;
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      touch-action: manipulation;
    }
    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
    }
    ::-webkit-scrollbar-thumb {
      background: #4f46e5;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #6366f1;
    }

    /* ============================================================
       PARTICLES CANVAS
       ============================================================ */
    #particles-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      z-index: 0;
      pointer-events: none;
    }

    /* ============================================================
       APP WRAPPER
       ============================================================ */
    .app-wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    .container-custom {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.25rem;
      width: 100%;
    }
    @media (max-width: 480px) {
      .container-custom {
        padding: 0 0.9rem;
      }
    }

    /* ============================================================
       HEADER
       ============================================================ */
    .header {
      backdrop-filter: blur(18px) saturate(1.2);
      -webkit-backdrop-filter: blur(18px) saturate(1.2);
      background: rgba(11, 14, 26, 0.6);
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      transition: background 0.3s;
    }
    .header-logo {
      filter: drop-shadow(0 0 16px rgba(79, 70, 229, 0.25));
      transition: filter 0.3s;
      flex-shrink: 0;
    }
    .header-logo:hover {
      filter: drop-shadow(0 0 28px rgba(79, 70, 229, 0.5));
    }
    .header-logo img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid rgba(79, 70, 229, 0.4);
      object-fit: cover;
      flex-shrink: 0;
    }
    .glow-text {
      text-shadow: 0 0 40px rgba(79, 70, 229, 0.2);
    }
    @media (max-width: 480px) {
      .header-logo img {
        width: 34px;
        height: 34px;
      }
      .header-logo span {
        font-size: 1.05rem;
      }
    }

    /* ============================================================
       GLASS CARD
       ============================================================ */
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 1.5rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.35s ease;
    }
    .glass-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(79, 70, 229, 0.10);
    }

    /* ============================================================
       NEWS CARD
       ============================================================ */
    .news-card {
      background: rgba(255, 255, 255, 0.025);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 1.2rem;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      cursor: pointer;
      will-change: transform;
    }
    .news-card:active {
      transform: scale(0.97);
    }
    .news-card:hover {
      transform: translateY(-8px) scale(1.01);
      border-color: rgba(79, 70, 229, 0.2);
      box-shadow: 0 20px 60px rgba(79, 70, 229, 0.08);
    }
    .news-card img {
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: transform;
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: rgba(255, 255, 255, 0.02);
    }
    .news-card:hover img {
      transform: scale(1.04);
    }
    .news-card .card-body {
      padding: 1.25rem;
    }
    .news-card .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 0.4rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .news-card .card-excerpt {
      font-size: 0.875rem;
      color: rgba(255, 255, 255, 0.5);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    @media (max-width: 480px) {
      .news-card img {
        height: 160px;
      }
      .news-card .card-body {
        padding: 1rem;
      }
      .news-card .card-title {
        font-size: 1rem;
      }
    }

    /* ============================================================
       GLOWING BUTTON
       ============================================================ */
    .glowing-btn-wrapper {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      padding: 0;
      cursor: pointer;
      outline: none;
      user-select: none;
      text-decoration: none;
      box-sizing: border-box;
      transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
      overflow: visible;
      font-family: inherit;
    }
    .glowing-btn-wrapper:hover:not(:disabled) {
      transform: scale(1.025);
    }
    .glowing-btn-wrapper:active:not(:disabled) {
      transform: scale(0.97);
    }
    .glowing-btn-wrapper:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    .glowing-btn-border-track {
      position: absolute;
      inset: 0;
      padding: 1.5px;
      overflow: hidden;
      z-index: 1;
      pointer-events: none;
    }
    .shape-pill,
    .shape-pill .glowing-btn-border-track,
    .shape-pill .glowing-btn-content,
    .shape-pill .glowing-btn-glow-layer {
      border-radius: 9999px;
    }
    .shape-rounded,
    .shape-rounded .glowing-btn-border-track,
    .shape-rounded .glowing-btn-glow-layer {
      border-radius: 12px;
    }
    .shape-rounded .glowing-btn-content {
      border-radius: 10.5px;
    }

    .glowing-btn-spinner {
      position: absolute;
      top: -150%;
      left: -150%;
      width: 400%;
      height: 400%;
      transform-origin: center;
    }
    @keyframes glowing-btn-spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }
    .speed-slow .glowing-btn-spinner {
      animation: glowing-btn-spin 8s linear infinite;
    }
    .speed-normal .glowing-btn-spinner {
      animation: glowing-btn-spin 4s linear infinite;
    }
    .speed-fast .glowing-btn-spinner {
      animation: glowing-btn-spin 1.8s linear infinite;
    }

    .preset-aurora .glowing-btn-spinner {
      background: conic-gradient(from 0deg, transparent 0deg, #3b82f6 60deg, #d946ef 120deg, #8b5cf6 180deg, #06b6d4 240deg, #3b82f6 300deg, transparent 360deg);
    }
    .preset-cyber .glowing-btn-spinner {
      background: conic-gradient(from 0deg, transparent 0deg, #10b981 30deg, transparent 70deg, transparent 180deg, #06b6d4 210deg, transparent 250deg, transparent 360deg);
    }
    .preset-ember .glowing-btn-spinner {
      background: conic-gradient(from 0deg, transparent 0deg, #f97316 45deg, #ef4444 135deg, #eab308 225deg, #f97316 315deg, transparent 360deg);
    }
    .preset-glass .glowing-btn-spinner {
      background: conic-gradient(from 0deg, transparent 0deg, rgba(255, 255, 255, 0.05) 90deg, rgba(255, 255, 255, 0.7) 180deg, rgba(255, 255, 255, 0.05) 270deg, rgba(255, 255, 255, 0.7) 360deg);
    }

    .glowing-btn-glow-layer {
      position: absolute;
      inset: -2px;
      z-index: 0;
      pointer-events: none;
      transition: opacity 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      overflow: hidden;
    }
    .glow-none {
      display: none;
    }
    .glow-low {
      filter: blur(8px);
      opacity: 0.35;
    }
    .glow-medium {
      filter: blur(16px);
      opacity: 0.6;
    }
    .glow-high {
      filter: blur(28px);
      opacity: 0.85;
    }
    .glowing-btn-wrapper:hover:not(:disabled) .glow-low {
      opacity: 0.65;
    }
    .glowing-btn-wrapper:hover:not(:disabled) .glow-medium {
      opacity: 0.85;
    }
    .glowing-btn-wrapper:hover:not(:disabled) .glow-high {
      opacity: 1;
    }

    .glowing-btn-content {
      position: relative;
      z-index: 2;
      margin: 1.5px;
      padding: 12px 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      color: #ffffff;
      background: #09090b;
      transition: background 0.3s ease, color 0.3s ease;
    }
    .preset-glass .glowing-btn-content {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .glowing-btn-wrapper:hover:not(:disabled) .glowing-btn-content {
      background: #121215;
    }
    .preset-glass.glowing-btn-wrapper:hover:not(:disabled) .glowing-btn-content {
      background: rgba(255, 255, 255, 0.07);
    }

    .glowing-btn-wrapper:focus-visible {
      box-shadow: 0 0 0 3px #000, 0 0 0 5px rgba(255, 255, 255, 0.55);
    }
    .glowing-btn-wrapper:disabled .glowing-btn-border-track {
      background: rgba(255, 255, 255, 0.05) !important;
    }
    .glowing-btn-wrapper:disabled .glowing-btn-spinner {
      display: none !important;
    }
    .glowing-btn-wrapper:disabled .glowing-btn-glow-layer {
      display: none !important;
    }
    .glowing-btn-wrapper:disabled .glowing-btn-content {
      background: rgba(255, 255, 255, 0.02) !important;
      color: rgba(255, 255, 255, 0.2) !important;
    }

    /* ============================================================
       EXPANDING SEARCH
       ============================================================ */
    .exp-search-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
    }

    .exp-search-pill {
      height: 52px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 9999px;
      display: flex;
      align-items: center;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      box-sizing: border-box;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.04);
      transition: width 0.45s cubic-bezier(0.25, 0.8, 0.25, 1), border-color 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      width: 52px;
      min-width: 52px;
      will-change: width;
    }

    .exp-search-pill.expanded {
      width: 100%;
      max-width: 480px;
      border-color: rgba(139, 92, 246, 0.35);
      background: rgba(10, 10, 12, 0.6);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4), 0 0 0 3px rgba(139, 92, 246, 0.06), inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .exp-search-pill.expanded .exp-search-icon-btn {
      color: #a78bfa;
    }

    .exp-search-icon-btn {
      width: 52px;
      min-width: 52px;
      height: 52px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.35);
      transition: color 0.3s ease;
      cursor: pointer;
      border: none;
      background: transparent;
      outline: none;
    }

    .exp-search-icon-btn:hover {
      color: rgba(255, 255, 255, 0.7);
    }

    .exp-search-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 0.95rem;
      font-weight: 500;
      color: #ffffff;
      padding: 0 0 0 2px;
      caret-color: #a78bfa;
      min-width: 0;
      width: 100%;
      font-family: inherit;
    }

    .exp-search-input::placeholder {
      color: rgba(255, 255, 255, 0.25);
      font-weight: 400;
    }

    .exp-search-input-wrapper {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      opacity: 0;
      transform: scaleX(0.7);
      transform-origin: left center;
      transition: opacity 0.25s ease 0.1s, transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) 0.05s;
    }

    .exp-search-pill.expanded .exp-search-input-wrapper {
      opacity: 1;
      transform: scaleX(1);
    }

    .exp-search-clear-btn {
      width: 34px;
      height: 34px;
      margin-right: 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.3);
      cursor: pointer;
      border: none;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 9999px;
      transition: all 0.25s ease;
      opacity: 0;
      transform: scale(0.7);
      pointer-events: none;
    }

    .exp-search-clear-btn.visible {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    .exp-search-clear-btn:hover {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.12);
    }

    .exp-search-shortcut {
      font-size: 0.55rem;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.04);
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      letter-spacing: 0.04em;
      flex-shrink: 0;
      margin-right: 4px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .exp-search-shortcut.visible {
      opacity: 1;
    }

    @media (max-width: 480px) {
      .exp-search-pill {
        height: 46px;
        min-width: 46px;
      }
      .exp-search-pill.expanded {
        max-width: 100%;
      }
      .exp-search-icon-btn {
        width: 46px;
        min-width: 46px;
        height: 46px;
      }
      .exp-search-icon-btn svg {
        width: 16px;
        height: 16px;
      }
      .exp-search-input {
        font-size: 0.85rem;
      }
      .exp-search-clear-btn {
        width: 30px;
        height: 30px;
        margin-right: 4px;
      }
      .exp-search-shortcut {
        display: none;
      }
    }

    /* ============================================================
       CINEMATIC BLUR TEXT (tanpa replay)
       ============================================================ */
    .cinematic-blur-outer {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 0.25rem 0;
    }

    .cinematic-blur-container {
      display: inline;
      font-family: inherit;
      font-weight: inherit;
      color: inherit;
      text-align: center;
      line-height: 1.3;
    }

    .cinematic-blur-char {
      display: inline-block;
      white-space: pre;
      opacity: 0;
      filter: blur(8px);
      transform: translateY(6px);
      transition: opacity 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94), transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: opacity, filter, transform;
    }

    .cinematic-blur-char.visible {
      opacity: 1;
      filter: blur(0px);
      transform: translateY(0);
    }

    /* Stagger via nth-child */
    .cinematic-blur-char:nth-child(1) {
      transition-delay: 0.00s;
    }
    .cinematic-blur-char:nth-child(2) {
      transition-delay: 0.03s;
    }
    .cinematic-blur-char:nth-child(3) {
      transition-delay: 0.06s;
    }
    .cinematic-blur-char:nth-child(4) {
      transition-delay: 0.09s;
    }
    .cinematic-blur-char:nth-child(5) {
      transition-delay: 0.12s;
    }
    .cinematic-blur-char:nth-child(6) {
      transition-delay: 0.15s;
    }
    .cinematic-blur-char:nth-child(7) {
      transition-delay: 0.18s;
    }
    .cinematic-blur-char:nth-child(8) {
      transition-delay: 0.21s;
    }
    .cinematic-blur-char:nth-child(9) {
      transition-delay: 0.24s;
    }
    .cinematic-blur-char:nth-child(10) {
      transition-delay: 0.27s;
    }
    .cinematic-blur-char:nth-child(11) {
      transition-delay: 0.30s;
    }
    .cinematic-blur-char:nth-child(12) {
      transition-delay: 0.33s;
    }
    .cinematic-blur-char:nth-child(13) {
      transition-delay: 0.36s;
    }
    .cinematic-blur-char:nth-child(14) {
      transition-delay: 0.39s;
    }
    .cinematic-blur-char:nth-child(15) {
      transition-delay: 0.42s;
    }
    .cinematic-blur-char:nth-child(16) {
      transition-delay: 0.45s;
    }
    .cinematic-blur-char:nth-child(17) {
      transition-delay: 0.48s;
    }
    .cinematic-blur-char:nth-child(18) {
      transition-delay: 0.51s;
    }
    .cinematic-blur-char:nth-child(19) {
      transition-delay: 0.54s;
    }
    .cinematic-blur-char:nth-child(20) {
      transition-delay: 0.57s;
    }
    .cinematic-blur-char:nth-child(21) {
      transition-delay: 0.60s;
    }
    .cinematic-blur-char:nth-child(22) {
      transition-delay: 0.63s;
    }
    .cinematic-blur-char:nth-child(23) {
      transition-delay: 0.66s;
    }
    .cinematic-blur-char:nth-child(24) {
      transition-delay: 0.69s;
    }
    .cinematic-blur-char:nth-child(25) {
      transition-delay: 0.72s;
    }
    .cinematic-blur-char:nth-child(26) {
      transition-delay: 0.75s;
    }
    .cinematic-blur-char:nth-child(27) {
      transition-delay: 0.78s;
    }
    .cinematic-blur-char:nth-child(28) {
      transition-delay: 0.81s;
    }
    .cinematic-blur-char:nth-child(29) {
      transition-delay: 0.84s;
    }
    .cinematic-blur-char:nth-child(30) {
      transition-delay: 0.87s;
    }

    @media (max-width: 480px) {
      .cinematic-blur-char {
        transition-duration: 0.5s;
      }
    }

    /* ============================================================
       FLUID SWITCH
       ============================================================ */
    .fluid-switch-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0.25rem 0;
      margin: 0.5rem 0 1.5rem 0;
    }

    .fluid-switch-track {
      display: inline-flex;
      position: relative;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 9999px;
      padding: 0.3rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.2);
      gap: 0.2rem;
    }

    .fluid-switch-item {
      position: relative;
      padding: 0.5rem 1.4rem;
      border-radius: 9999px;
      border: none;
      background: transparent;
      color: rgba(255, 255, 255, 0.35);
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.3s ease;
      z-index: 2;
      touch-action: manipulation;
      white-space: nowrap;
    }

    .fluid-switch-item.active {
      color: #ffffff;
    }

    .fluid-switch-item:hover:not(.active) {
      color: rgba(255, 255, 255, 0.6);
    }

    .fluid-switch-indicator {
      position: absolute;
      top: 0.3rem;
      bottom: 0.3rem;
      border-radius: 9999px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      box-shadow: 0 4px 16px rgba(79, 70, 229, 0.3);
      transition: left 0.45s cubic-bezier(0.25, 0.8, 0.25, 1), width 0.45s cubic-bezier(0.25, 0.8, 0.25, 1);
      z-index: 1;
      will-change: left, width;
    }

    @media (max-width: 480px) {
      .fluid-switch-item {
        padding: 0.4rem 1rem;
        font-size: 0.7rem;
      }
      .fluid-switch-track {
        padding: 0.2rem;
        gap: 0.1rem;
      }
      .fluid-switch-indicator {
        top: 0.2rem;
        bottom: 0.2rem;

  <script>
    // ================================================================
    // 1. PARTICLES (Canvas)
    // ================================================================
    (function initParticles() {
      const canvas = document.getElementById('particles-canvas');
      const ctx = canvas.getContext('2d');
      let width, height, particles = [];
      const NUM = 100;
      let animId;

      function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      class Particle {
        constructor() {
          this.x = Math.random() * width;
          this.y = Math.random() * height;
          this.size = Math.random() * 2.2 + 0.3;
          this.speedX = (Math.random() - 0.5) * 0.35;
          this.speedY = (Math.random() - 0.5) * 0.35;
          this.opacity = Math.random() * 0.5 + 0.15;
        }
        update() {
          this.x += this.speedX;
          this.y += this.speedY;
          if (this.x < 0 || this.x > width) this.speedX *= -1;
          if (this.y < 0 || this.y > height) this.speedY *= -1;
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255,255,255,' + this.opacity + ')';
          ctx.fill();
          ctx.shadowColor = 'rgba(79,70,229,0.2)';
          ctx.shadowBlur = 6;
        }
      }

      for (var i = 0; i < NUM; i++) {
        particles.push(new Particle());
      }

      function drawLines() {
        for (var i = 0; i < particles.length; i++) {
          for (var j = i + 1; j < particles.length; j++) {
            var dx = particles[i].x - particles[j].x;
            var dy = particles[i].y - particles[j].y;
            var dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 140) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = 'rgba(79,70,229,' + (0.06 * (1 - dist / 140)) + ')';
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
        }
      }

      function animate() {
        ctx.clearRect(0, 0, width, height);
        for (var i = 0; i < particles.length; i++) {
          particles[i].update();
          particles[i].draw();
        }
        drawLines();
        animId = requestAnimationFrame(animate);
      }
      animate();

      window.addEventListener('beforeunload', function() {
        if (animId) cancelAnimationFrame(animId);
      });
    })();

    // ================================================================
    // 2. DATA LAYER
    // ================================================================
    var STORAGE_KEY = 'newsData';
    var RECENT_KEY = 'recentSearches';
    var DEFAULT_NEWS = [{
      id: '1',
      title: 'Welcome to INFORMATION SAINTS',
      slug: 'welcome-to-information-saints',
      content: 'This is the first article on INFORMATION SAINTS. You can edit, delete, or add new articles via the Admin panel.\n\nAll data is stored locally in your browser using localStorage. This makes the website fast and self-contained.\n\nEnjoy exploring!',
      excerpt: 'Welcome to INFORMATION SAINTS – your trusted source for quality news.',
      image: 'https://files.catbox.moe/4yfb2h.jpg',
      createdAt: new Date().toISOString()
    }];
    var SUGGESTED_TAGS = ['Technology', 'Design', 'Innovation', 'AI', 'Startups', 'Culture'];

    function getNews() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          var data = JSON.parse(raw);
          if (Array.isArray(data) && data.length) return data;
        }
      } catch (e) {}
      localStorage.setItem(STORAGE_KEY, JSON.stringify(DEFAULT_NEWS));
      return DEFAULT_NEWS.slice();
    }

    function saveNews(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function getRecentSearches() {
      try {
        var raw = localStorage.getItem(RECENT_KEY);
        if (raw) {
          var data = JSON.parse(raw);
          if (Array.isArray(data)) return data;
        }
      } catch (e) {}
      return [];
    }

    function saveRecentSearches(arr) {
      var unique = [];
      var seen = {};
      for (var i = 0; i < arr.length; i++) {
        var key = arr[i].toLowerCase();
        if (!seen[key]) {
          seen[key] = true;
          unique.push(arr[i]);
        }
      }
      var trimmed = unique.slice(0, 8);
      localStorage.setItem(RECENT_KEY, JSON.stringify(trimmed));
    }

    function addRecentSearch(query) {
      var recent = getRecentSearches();
      var filtered = [];
      for (var i = 0; i < recent.length; i++) {
        if (recent[i].toLowerCase() !== query.toLowerCase()) {
          filtered.push(recent[i]);
        }
      }
      filtered.unshift(query);
      saveRecentSearches(filtered);
    }

    function removeRecentSearch(query) {
      var recent = getRecentSearches();
      var filtered = [];
      for (var i = 0; i < recent.length; i++) {
        if (recent[i].toLowerCase() !== query.toLowerCase()) {
          filtered.push(recent[i]);
        }
      }
      saveRecentSearches(filtered);
    }

    // ================================================================
    // 3. CINEMATIC BLUR TEXT (tanpa replay)
    // ================================================================
    function renderCinematicBlurText(container, text, className) {
      var outer = document.createElement('div');
      outer.className = 'cinematic-blur-outer' + (className ? ' ' + className : '');

      var span = document.createElement('span');
      span.className = 'cinematic-blur-container';

      var chars = text.split('');
      var charSpans = [];

      for (var i = 0; i < chars.length; i++) {
        var el = document.createElement('span');
        el.className = 'cinematic-blur-char';
        el.textContent = chars[i] === ' ' ? '\u00A0' : chars[i];
        // Stagger via inline style
        var delay = Math.min(i * 0.03, 1.2);
        el.style.transitionDelay = delay + 's';
        span.appendChild(el);
        charSpans.push(el);
      }

      outer.appendChild(span);
      container.appendChild(outer);

      // Auto-start animasi
      requestAnimationFrame(function() {
        for (var j = 0; j < charSpans.length; j++) {
          (function(idx) {
            var delay = Math.min(idx * 0.03, 1.2);
            setTimeout(function() {
              charSpans[idx].classList.add('visible');
              charSpans[idx].style.opacity = '1';
              charSpans[idx].style.filter = 'blur(0px)';
              charSpans[idx].style.transform = 'translateY(0)';
            }, delay * 1000 + 100);
          })(j);
        }
      });

      return outer;
    }

    // ================================================================
    // 4. EXPANDING SEARCH
    // ================================================================
    function renderExpandingSearch(container, onSearch, initialValue) {
      var wrapper = document.createElement('div');
      wrapper.className = 'exp-search-wrapper';
      wrapper.id = 'expSearchWrapper';

      var pill = document.createElement('div');
      pill.className = 'exp-search-pill';
      pill.id = 'expSearchPill';
      pill.setAttribute('role', 'search');

      var iconBtn = document.createElement('button');
      iconBtn.className = 'exp-search-icon-btn';
      iconBtn.setAttribute('aria-label', 'Search');
      iconBtn.type = 'button';
      iconBtn.innerHTML = '<i class="fas fa-search" style="font-size:1rem;"></i>';
      iconBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        expandSearch();
      });

      var inputWrapper = document.createElement('div');
      inputWrapper.className = 'exp-search-input-wrapper';

      var input = document.createElement('input');
      input.type = 'text';
      input.className = 'exp-search-input';
      input.placeholder = 'Search news, topics...';
      input.id = 'expSearchInput';
      input.autocomplete = 'off';
      if (initialValue) input.value = initialValue;

      inputWrapper.appendChild(input);

      var clearBtn = document.createElement('button');
      clearBtn.className = 'exp-search-clear-btn';
      clearBtn.type = 'button';
      clearBtn.setAttribute('aria-label', 'Clear');
      clearBtn.innerHTML = '<i class="fas fa-times" style="font-size:0.7rem;"></i>';
      clearBtn.id = 'expClearBtn';

      var shortcut = document.createElement('span');
      shortcut.className = 'exp-search-shortcut';
      shortcut.textContent = '⌘K';

      pill.appendChild(iconBtn);
      pill.appendChild(inputWrapper);
      pill.appendChild(clearBtn);
      pill.appendChild(shortcut);
      wrapper.appendChild(pill);
      container.appendChild(wrapper);

      var isExpanded = false;
      var currentValue = initialValue || '';

      function expandSearch() {
        if (isExpanded) return;
        isExpanded = true;
        pill.classList.add('expanded');
        setTimeout(function() {
          input.focus();
          input.setSelectionRange(input.value.length, input.value.length);
        }, 200);
        updateClearBtn();
      }

      function collapseSearch() {
        if (!isExpanded) return;
        isExpanded = false;
        pill.classList.remove('expanded');
        if (onSearch) onSearch('');
        updateClearBtn();
      }

      function updateClearBtn() {
        var hasValue = input.value.length > 0;
        clearBtn.classList.toggle('visible', hasValue);
        shortcut.classList.toggle('visible', isExpanded && !hasValue);
      }

      input.addEventListener('input', function() {
        currentValue = input.value;
        updateClearBtn();
        if (onSearch) onSearch(currentValue);
      });

      clearBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        input.value = '';
        currentValue = '';
        updateClearBtn();
        if (onSearch) onSearch('');
        input.focus();
      });

      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          var val = input.value.trim();
          if (val) {
            addRecentSearch(val);
            if (onSearch) onSearch(val);
            collapseSearch();
            input.blur();
          }
        }
        if (e.key === 'Escape') {
          collapseSearch();
          input.blur();
        }
      });

      document.addEventListener('click', function(e) {
        if (!wrapper.contains(e.target)) {
          if (isExpanded && !input.value) {
            collapseSearch();
          }
        }
      });

      input.addEventListener('focus', function() {
        if (!isExpanded) expandSearch();
        updateClearBtn();
      });

      document.addEventListener('keydown', function(e) {
        if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
          e.preventDefault();
          if (!isExpanded) expandSearch();
          input.focus();
        }
      });

      if (initialValue) {
        input.value = initialValue;
        currentValue = initialValue;
        setTimeout(function() { expandSearch(); }, 100);
      }

      wrapper.expand = expandSearch;
      wrapper.collapse = collapseSearch;
      wrapper.getValue = function() { return input.value; };
      wrapper.setValue = function(val) {
        input.value = val;
        currentValue = val;
        updateClearBtn();
        if (onSearch) onSearch(val);
      };

      return wrapper;
    }

    // ================================================================
    // 5. FLUID SWITCH
    // ================================================================
    function renderFluidSwitch(container, activeFilter, onChange) {
      var wrapper = document.createElement('div');
      wrapper.className = 'fluid-switch-wrapper';

      var track = document.createElement('div');
      track.className = 'fluid-switch-track';

      var items = [
        { key: 'latest', label: 'Latest', icon: 'fa-clock' },
        { key: 'popular', label: 'Popular', icon: 'fa-fire' },
        { key: 'trending', label: 'Trending', icon: 'fa-chart-line' }
      ];

      var indicator = document.createElement('div');
      indicator.className = 'fluid-switch-indicator';
      track.appendChild(indicator);

      for (var i = 0; i < items.length; i++) {
        (function(item) {
          var btn = document.createElement('button');
          btn.className = 'fluid-switch-item' + (item.key === activeFilter ? ' active' : '');
          btn.dataset.key = item.key;
          btn.innerHTML = '<i class="fas ' + item.icon + ' mr-1"></i> ' + item.label;
          btn.addEventListener('click', function() {
            if (onChange) onChange(item.key);
          });
          track.appendChild(btn);
        })(items[i]);
      }

      wrapper.appendChild(track);
      container.appendChild(wrapper);

      function updateIndicator() {
        var activeBtn = track.querySelector('.fluid-switch-item.active');
        if (!activeBtn) return;
        var trackRect = track.getBoundingClientRect();
        var btnRect = activeBtn.getBoundingClientRect();
        var left = btnRect.left - trackRect.left;
        var width = btnRect.width;
        indicator.style.left = left + 'px';
        indicator.style.width = width + 'px';
      }

      requestAnimationFrame(updateIndicator);

      var resizeObserver = new ResizeObserver(function() { updateIndicator(); });
      resizeObserver.observe(track);

      wrapper.updateIndicator = updateIndicator;
      return wrapper;
    }

    // ================================================================
    // 6. DECRYPTION TEXT (hover effect)
    // ================================================================
    function initDecryptionEffect() {
      var triggers = document.querySelectorAll('.decrypt-trigger');
      for (var i = 0; i < triggers.length; i++) {
        (function(el) {
          var originalText = el.dataset.text || el.textContent.trim();
          el.dataset.original = originalText;

          var isDecrypting = false;
          var timer = null;

          el.addEventListener('mouseenter', function() {
            if (isDecrypting) return;
            isDecrypting = true;
            var allChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+-=';
            var targetText = el.dataset.original;
            var length = targetText.length;
            var step = 0;
            var totalSteps = 12 + Math.floor(length * 0.3);

            function doDecrypt() {
              if (step >= totalSteps) {
                el.textContent = targetText;
                isDecrypting = false;
                return;
              }
              var revealCount = Math.floor((step / totalSteps) * length);
              var newChars = [];
              for (var j = 0; j < length; j++) {
                if (j < revealCount) {
                  newChars[j] = targetText[j];
                } else {
                  var randomIdx = Math.floor(Math.random() * allChars.length);
                  newChars[j] = allChars[randomIdx];
                }
              }
              el.textContent = newChars.join('');
              step++;
              timer = setTimeout(doDecrypt, 40 + Math.random() * 30);
            }
            doDecrypt();
          });

          el.addEventListener('mouseleave', function() {
            if (timer) {
              clearTimeout(timer);
              timer = null;
            }
            isDecrypting = false;
            if (el.dataset.original) {
              el.textContent = el.dataset.original;
            }
          });
        })(triggers[i]);
      }
    }

    // ================================================================
    // 7. NAVIGATION
    // ================================================================
    function navigate(page, param) {
      if (page === 'detail' && param) {
        window.location.hash = 'detail/' + param;
      } else {
        window.location.hash = '';
      }
      renderPage(page, param);
    }

    function renderPage(page, param) {
      var container = document.getElementById('mainContent');
      container.style.opacity = '0';
      container.style.transform = 'translateY(18px)';
      setTimeout(function() {
        if (page === 'home') renderHome(container);
        else if (page === 'detail' && param) renderDetail(container, param);
        else renderHome(container);
        container.style.opacity = '1';
        container.style.transform = 'translateY(0)';
      }, 100);
    }

    // ================================================================
    // 8. HOME
    // ================================================================
    function renderHome(container) {
      var news = getNews();
      var searchQueryParam = new URLSearchParams(window.location.search).get('q') || '';
      var filterParam = new URLSearchParams(window.location.search).get('filter') || 'latest';

      // Filter
      var filtered = news.slice();
      if (searchQueryParam) {
        var q = searchQueryParam.toLowerCase();
        filtered = filtered.filter(function(item) {
          return item.title.toLowerCase().indexOf(q) !== -1 ||
            item.content.toLowerCase().indexOf(q) !== -1 ||
            (item.excerpt && item.excerpt.toLowerCase().indexOf(q) !== -1);
        });
      }

      // Sort by filter
      if (filterParam === 'popular') {
        filtered.sort(function(a, b) { return b.content.length - a.content.length; });
      } else if (filterParam === 'trending') {
        filtered.sort(function(a, b) { return new Date(b.createdAt) - new Date(a.createdAt); });
      } else {
        filtered.sort(function(a, b) { return new Date(b.createdAt) - new Date(a.createdAt); });
      }

      var html = '';
      html += '<div class="mb-4">';
      html += '  <div id="cinematicContainer" class="hero-headline glow-text"></div>';
      html += '  <p class="text-sm text-gray-500 text-center mt-1">Stay informed with the latest stories</p>';
      html += '</div>';
      html += '<div class="mb-3" id="searchContainer"></div>';
      html += '<div id="filterContainer" class="mb-6"></div>';

      if (filtered.length === 0) {
        html += '<div class="no-news">';
        html += '  <h2>' + (searchQueryParam ? 'No results found' : 'No news yet') + '</h2>';
        html += '  <p>' + (searchQueryParam ? 'No articles matching "' + searchQueryParam + '"' :
          'Go to Admin to add your first article.') + '</p>';
        if (searchQueryParam) {
          html +=
            '  <button class="glowing-btn-wrapper shape-pill speed-normal preset-ember glow-low mt-4" onclick="clearSearch()">';
          html += '    <div class="glowing-btn-glow-layer glow-low"><div class="glowing-btn-spinner"></div></div>';
          html += '    <div class="glowing-btn-border-track"><div class="glowing-btn-spinner"></div></div>';
          html += '    <span class="glowing-btn-content"><i class="fas fa-times mr-2"></i> Clear Search</span>';
          html += '  </button>';
        }
        html += '</div>';
      } else {
        html += '<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 md:gap-6">';
        for (var i = 0; i < filtered.length; i++) {
          var item = filtered[i];
          var delay = (i % 3) + 1;
          html += '<div class="news-card fade-in fade-in-delay-' + delay + '" onclick="navigate(\'detail\',\'' + item.slug +
            '\')">';
          if (item.image) {
            html += '<img src="' + item.image + '" alt="' + escapeHtml(item.title) + '" loading="lazy" />';
          }
          html += '  <div class="card-body">';
          html += '    <div class="card-title decrypt-trigger" data-text="' + escapeHtml(item.title) + '">' + escapeHtml(
            item.title) + '<div class="decrypt-glow"></div></div>';
          html += '    <div class="card-excerpt">' + escapeHtml(item.excerpt || item.content.slice(0, 120) + '…') +
            '</div>';
          html +=
            '    <div class="flex items-center justify-between mt-3 text-xs text-gray-500">';
          html += '      <span><i class="far fa-calendar mr-1"></i>' + formatDate(item.createdAt) + '</span>';
          html += '      <span><i class="far fa-clock mr-1"></i>' + Math.ceil(item.content.length / 250) +
            ' min read</span>';
          html += '    </div>';
          html += '  </div>';
          html += '</div>';
        }
        html += '</div>';
      }

      // Profile Card
      html += '<div class="mt-12 flex justify-center">';
      html += '  <div class="profile-card">';
      html += '    <div class="profile-cover"></div>';
      html += '    <div class="profile-avatar">';
      html += '      <img src="https://files.catbox.moe/4yfb2h.jpg" alt="INFORMATION SAINTS" />';
      html += '    </div>';
      html += '    <div class="profile-name">';
      html += '      INFORMATION SAINTS';
      html += '      <span class="verified-badge"><i class="fas fa-check"></i></span>';
      html += '    </div>';
      html += '    <div class="profile-bio">Your trusted source for quality news, insights, and stories from around the world.</div>';
      html += '    <div class="profile-stats">';
      html += '      <div class="stat"><span class="value">' + news.length + '</span><span class="label">Articles</span></div>';
      html += '      <div class="stat"><span class="value">∞</span><span class="label">Readers</span></div>';
      html += '      <div class="stat"><span class="value">' + new Date().getFullYear() +
        '</span><span class="label">Founded</span></div>';
      html += '    </div>';
      html += '    <div class="profile-action">';
      html +=
        '      <button class="glowing-btn-wrapper shape-pill speed-normal preset-aurora glow-low w-full justify-center" onclick="navigate(\'home\')">';
      html += '        <div class="glowing-btn-glow-layer glow-low"><div class="glowing-btn-spinner"></div></div>';
      html += '        <div class="glowing-btn-border-track"><div class="glowing-btn-spinner"></div></div>';
      html += '        <span class="glowing-btn-content"><i class="fas fa-globe-americas mr-2"></i> Explore All</span>';
      html += '      </button>';
      html += '    </div>';
      html += '  </div>';
      html += '</div>';

      container.innerHTML = html;

      // Cinematic Text
      var cinematicContainer = document.getElementById('cinematicContainer');
      if (cinematicContainer) {
        renderCinematicBlurText(cinematicContainer, 'INFORMATION SAINTS', '');
      }

      // Search
      var searchContainer = document.getElementById('searchContainer');
      if (searchContainer) {
        var search = renderExpandingSearch(searchContainer, function(query) {
          if (query) {
            var url = new URL(window.location);
            url.searchParams.set('q', query);
            window.history.pushState({}, '', url);
            renderHome(container);
          } else {
            var url = new URL(window.location);
            url.searchParams.delete('q');
            window.history.pushState({}, '', url);
            renderHome(container);
          }
        }, searchQueryParam);

        if (searchQueryParam) {
          setTimeout(function() {
            if (search && search.expand) search.expand();
          }, 300);
        }
      }

      // Fluid Switch
      var filterContainer = document.getElementById('filterContainer');
      if (filterContainer) {
        renderFluidSwitch(filterContainer, filterParam, function(filter) {
          var url = new URL(window.location);
          url.searchParams.set('filter', filter);
          window.history.pushState({}, '', url);
          renderHome(container);
        });
      }

      // Decryption Effect
      initDecryptionEffect();
    }

    function clearSearch() {
      var url = new URL(window.location);
      url.searchParams.delete('q');
      window.history.pushState({}, '', url);
      renderPage('home');
    }

    // ================================================================
    // 9. DETAIL
    // ================================================================
    function renderDetail(container, slug) {
      var news = getNews();
      var item = null;
      for (var i = 0; i < news.length; i++) {
        if (news[i].slug === slug) { item = news[i]; break; }
      }

      if (!item) {
        container.innerHTML =
          '<div class="text-center py-16 fade-in"><h2 class="text-2xl md:text-3xl font-bold text-red-400">Article Not Found</h2><a href="#" onclick="navigate(\'home\')" class="text-indigo-400 hover:underline mt-4 inline-block">← Back to Home</a></div>';
        return;
      }

      var html = '';
      html += '<article class="max-w-3xl mx-auto glass-card p-5 md:p-8 fade-in">';
      html +=
        '  <a href="#" onclick="navigate(\'home\')" class="text-indigo-400 hover:underline inline-block mb-4 text-sm"><i class="fas fa-arrow-left mr-2"></i>Back</a>';
      if (item.image) {
        html += '  <img src="' + item.image + '" alt="' + escapeHtml(item.title) +
          '" class="w-full h-48 md:h-64 object-cover rounded-xl mb-5" loading="lazy" />';
      }
      html += '  <h1 class="text-2xl md:text-4xl font-extrabold glow-text mb-2">' + escapeHtml(item.title) + '</h1>';
      html += '  <div class="text-sm text-gray-500 mb-5"><i class="far fa-calendar mr-2"></i>' + formatDate(item
        .createdAt) + '</div>';
      html += '  <div class="detail-content">' + escapeHtml(item.content) + '</div>';
      html += '</article>';

      container.innerHTML = html;
    }

    // ================================================================
    // 10. HELPERS
    // ================================================================
    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function formatDate(iso) {
      if (!iso) return '-';
      try {
        var d = new Date(iso);
        return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
      } catch (e) { return iso; }
    }

    // ================================================================
    // 11. HASH ROUTING
    // ================================================================
    function handleHash() {
      var hash = window.location.hash.slice(1);
      if (hash.indexOf('detail/') === 0) {
        var slug = hash.replace('detail/', '');
        navigate('detail', slug);
      } else {
        navigate('home');
      }
    }

    window.addEventListener('hashchange', handleHash);
    window.addEventListener('DOMContentLoaded', function() {
      getNews();
      handleHash();
    });

    // Expose
    window.navigate = navigate;
    window.clearSearch = clearSearch;
  </script>
</body>
</html>
