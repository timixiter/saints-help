<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INFORMATION SAINTS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* ===== GLOBAL ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0b0e1a;
      color: #e5e9f0;
      overflow-x: hidden;
      min-height: 100vh;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 8px; }

    /* ===== PARTICLE CANVAS ===== */
    #particles-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
    }

    /* ===== LAYOUT ===== */
    .app-wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .container-custom {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem;
      width: 100%;
    }

    /* ===== HEADER ===== */
    .header {
      backdrop-filter: blur(16px);
      background: rgba(11, 14, 26, 0.7);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .header-logo {
      filter: drop-shadow(0 0 12px rgba(79, 70, 229, 0.3));
      transition: filter 0.3s;
    }
    .header-logo:hover { filter: drop-shadow(0 0 20px rgba(79, 70, 229, 0.6)); }
    .glow-text {
      text-shadow: 0 0 40px rgba(79, 70, 229, 0.25);
    }

    /* ===== GLASS CARD ===== */
    .glass-card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 1.5rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .glass-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 48px rgba(79, 70, 229, 0.15);
    }

    /* ===== NEWS CARD ===== */
    .news-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 1.2rem;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      cursor: pointer;
    }
    .news-card:hover {
      transform: scale(1.02) translateY(-8px);
      border-color: rgba(79, 70, 229, 0.3);
      box-shadow: 0 20px 60px rgba(79, 70, 229, 0.15);
    }
    .news-card img {
      transition: transform 0.5s;
    }
    .news-card:hover img {
      transform: scale(1.04);
    }

    /* ===== ANIMATIONS ===== */
    .fade-in {
      animation: fadeInUp 0.6s ease forwards;
      opacity: 0;
    }
    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .fade-in-delay-1 { animation-delay: 0.1s; }
    .fade-in-delay-2 { animation-delay: 0.2s; }
    .fade-in-delay-3 { animation-delay: 0.3s; }

    /* ===== BUTTON ===== */
    .btn-primary {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      border: none;
      padding: 0.6rem 1.8rem;
      border-radius: 9999px;
      font-weight: 600;
      transition: all 0.3s;
      box-shadow: 0 4px 16px rgba(79, 70, 229, 0.3);
    }
    .btn-primary:hover {
      transform: scale(1.04);
      box-shadow: 0 8px 32px rgba(79, 70, 229, 0.5);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .header .container-custom { flex-wrap: wrap; }
      .header-logo span { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

  <!-- ===== PARTICLE CANVAS ===== -->
  <canvas id="particles-canvas"></canvas>

  <div class="app-wrapper">
    <!-- ===== HEADER ===== -->
    <header class="header sticky top-0 z-50">
      <div class="container-custom flex items-center justify-between py-3 md:py-4 flex-wrap gap-3">
        <a href="#" onclick="navigate('home')" class="header-logo flex items-center gap-3 cursor-pointer group">
          <img src="https://files.catbox.moe/4yfb2h.jpg" alt="Logo" class="h-10 w-10 rounded-full border-2 border-indigo-400 object-cover" />
          <span class="text-xl md:text-2xl font-bold tracking-wide glow-text">INFORMATION SAINTS</span>
        </a>
        <nav class="flex gap-4 text-sm md:text-base font-medium">
          <a href="#" onclick="navigate('home')" class="hover:text-indigo-400 transition">Home</a>
          <a href="saints.html" class="hover:text-indigo-400 transition">Admin</a>
        </nav>
      </div>
    </header>

    <!-- ===== MAIN ===== -->
    <main class="flex-1 container-custom py-8" id="mainContent">
      <!-- Dinamis oleh JS -->
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="border-t border-white/5 py-6 mt-8 text-center text-sm text-gray-400">
      <div class="container-custom">
        <p>&copy; 2026 <span class="text-indigo-400 font-semibold">INFORMATION SAINTS</span> — All rights reserved.</p>
      </div>
    </footer>
  </div>

  <script>
    // ==================== PARTICLES ====================
    (function initParticles() {
      const canvas = document.getElementById('particles-canvas');
      const ctx = canvas.getContext('2d');
      let width, height;
      let particles = [];
      const NUM = 120;

      function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      class Particle {
        constructor() {
          this.x = Math.random() * width;
          this.y = Math.random() * height;
          this.size = Math.random() * 2.2 + 0.5;
          this.speedX = (Math.random() - 0.5) * 0.4;
          this.speedY = (Math.random() - 0.5) * 0.4;
          this.opacity = Math.random() * 0.6 + 0.2;
        }
        update() {
          this.x += this.speedX;
          this.y += this.speedY;
          if (this.x < 0 || this.x > width) this.speedX *= -1;
          if (this.y < 0 || this.y > height) this.speedY *= -1;
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
          ctx.fill();
          ctx.shadowColor = 'rgba(79, 70, 229, 0.3)';
          ctx.shadowBlur = 8;
        }
      }

      for (let i = 0; i < NUM; i++) particles.push(new Particle());

      function drawLines() {
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 150) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(79, 70, 229, ${0.08 * (1 - dist / 150)})`;
              ctx.lineWidth = 0.6;
              ctx.stroke();
            }
          }
        }
      }

      function animate() {
        ctx.clearRect(0, 0, width, height);
        particles.forEach(p => { p.update(); p.draw(); });
        drawLines();
        requestAnimationFrame(animate);
      }
      animate();
    })();

    // ==================== DATA ====================
    const STORAGE_KEY = 'newsData';
    const DEFAULT_NEWS = [
      {
        id: '1',
        title: 'Welcome to INFORMATION SAINTS',
        slug: 'welcome-to-information-saints',
        content: 'This is the first article. Edit or delete it from the Admin panel. All data is stored locally in your browser.',
        excerpt: 'Welcome to INFORMATION SAINTS – your trusted news source.',
        image: 'https://files.catbox.moe/4yfb2h.jpg',
        createdAt: new Date().toISOString()
      }
    ];

    function getNews() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const data = JSON.parse(raw);
          if (Array.isArray(data) && data.length) return data;
        }
      } catch {}
      localStorage.setItem(STORAGE_KEY, JSON.stringify(DEFAULT_NEWS));
      return [...DEFAULT_NEWS];
    }

    // ==================== NAVIGATION ====================
    function navigate(page, param) {
      if (page === 'detail' && param) {
        window.location.hash = `detail/${param}`;
      } else {
        window.location.hash = '';
      }
      renderPage(page, param);
    }

    function renderPage(page, param) {
      const container = document.getElementById('mainContent');
      container.style.opacity = '0';
      container.style.transform = 'translateY(20px)';
      setTimeout(() => {
        if (page === 'home') renderHome(container);
        else if (page === 'detail' && param) renderDetail(container, param);
        else renderHome(container);
        container.style.opacity = '1';
        container.style.transform = 'translateY(0)';
        container.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
      }, 120);
    }

    // ---------- HOME ----------
    function renderHome(container) {
      const news = getNews();
      if (!news.length) {
        container.innerHTML = `
          <div class="text-center py-20 fade-in">
            <h1 class="text-4xl font-bold glow-text text-indigo-300">No News Yet</h1>
            <p class="text-gray-400 mt-3">Go to <a href="saints.html" class="text-indigo-400 hover:underline">Admin</a> to add your first article.</p>
          </div>
        `;
        return;
      }

      let cards = news.map((item, idx) => `
        <div class="news-card fade-in fade-in-delay-${idx % 3 + 1}" onclick="navigate('detail','${item.slug}')">
          ${item.image ? `<img src="${item.image}" alt="${item.title}" class="w-full h-52 object-cover" />` : ''}
          <div class="p-5">
            <h2 class="text-xl font-bold mb-2 line-clamp-2">${item.title}</h2>
            <p class="text-gray-400 text-sm line-clamp-3">${item.excerpt || item.content.slice(0, 150) + '…'}</p>
            <div class="flex items-center justify-between mt-4 text-xs text-gray-500">
              <span><i class="far fa-calendar mr-1"></i>${formatDate(item.createdAt)}</span>
              <span><i class="far fa-clock mr-1"></i>${Math.ceil(item.content.length / 200)} min read</span>
            </div>
          </div>
        </div>
      `).join('');

      container.innerHTML = `
        <div class="mb-8">
          <h1 class="text-3xl md:text-4xl font-bold glow-text">📰 Latest News</h1>
          <p class="text-gray-400 mt-1">Stay informed with the latest stories</p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">${cards}</div>
      `;
    }

    // ---------- DETAIL ----------
    function renderDetail(container, slug) {
      const news = getNews();
      const item = news.find(n => n.slug === slug);
      if (!item) {
        container.innerHTML = `
          <div class="text-center py-20 fade-in">
            <h2 class="text-3xl font-bold text-red-400">Article Not Found</h2>
            <a href="#" onclick="navigate('home')" class="text-indigo-400 hover:underline mt-4 inline-block">← Back to Home</a>
          </div>
        `;
        return;
      }

      container.innerHTML = `
        <article class="max-w-3xl mx-auto glass-card p-6 md:p-8 fade-in">
          <a href="#" onclick="navigate('home')" class="text-indigo-400 hover:underline inline-block mb-4"><i class="fas fa-arrow-left mr-2"></i>Back</a>
          ${item.image ? `<img src="${item.image}" alt="${item.title}" class="w-full h-64 object-cover rounded-xl mb-6" />` : ''}
          <h1 class="text-3xl md:text-4xl font-bold glow-text mb-3">${item.title}</h1>
          <div class="text-sm text-gray-400 mb-6"><i class="far fa-calendar mr-2"></i>${formatDate(item.createdAt)}</div>
          <div class="prose max-w-none text-gray-300 whitespace-pre-wrap leading-relaxed">${item.content}</div>
        </article>
      `;
    }

    // ==================== HELPERS ====================
    function formatDate(iso) {
      if (!iso) return '-';
      try {
        return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
      } catch { return iso; }
    }

    // ==================== HASH ROUTING ====================
    function handleHash() {
      const hash = window.location.hash.slice(1);
      if (hash.startsWith('detail/')) {
        const slug = hash.replace('detail/', '');
        navigate('detail', slug);
      } else {
        navigate('home');
      }
    }

    window.addEventListener('hashchange', handleHash);
    window.addEventListener('DOMContentLoaded', () => {
      getNews();
      handleHash();
    });

    window.navigate = navigate;
  </script>
</body>
</html>
