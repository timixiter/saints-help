<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAIN♱S - Request System</title>
  <style>
    /* ---------- Reset & Base ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      background: #f0f2f5;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .brand {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #1a1a2e;
      margin-bottom: 10px;
    }
    .brand span {
      color: #e94560;
    }
    .container {
      max-width: 820px;
      width: 100%;
      background: white;
      padding: 35px 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      transition: 0.3s;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    h1 small {
      font-size: 0.9rem;
      font-weight: 400;
      color: #6c757d;
    }
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 6px;
      color: #2d2d3f;
    }
    input,
    textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      transition: 0.2s;
      font-family: inherit;
    }
    input:focus,
    textarea:focus {
      outline: none;
      border-color: #e94560;
      box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.15);
    }
    button {
      background: #e94560;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover {
      background: #c73a52;
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(233, 69, 96, 0.3);
    }
    button:active {
      transform: translateY(0);
    }
    .btn-outline {
      background: transparent;
      color: #e94560;
      border: 2px solid #e94560;
    }
    .btn-outline:hover {
      background: #e94560;
      color: white;
      box-shadow: none;
    }
    .btn-danger {
      background: #dc3545;
    }
    .btn-danger:hover {
      background: #b02a37;
    }
    hr {
      margin: 28px 0;
      border: none;
      border-top: 1.5px solid #eee;
    }
    .info {
      margin: 12px 0;
      font-weight: 500;
      padding: 10px 14px;
      border-radius: 8px;
    }
    .info.success {
      background: #d4edda;
      color: #155724;
    }
    .info.error {
      background: #f8d7da;
      color: #721c24;
    }

    /* ----- Message List ----- */
    .message-item {
      border: 1px solid #e9ecef;
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 16px;
      background: #fafbfc;
      transition: 0.2s;
    }
    .message-item:hover {
      background: #f8f9fa;
      border-color: #dee2e6;
    }
    .message-item.unread {
      border-left: 6px solid #ffc107;
    }
    .message-item.read {
      border-left: 6px solid #28a745;
    }
    .msg-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 16px;
      margin-bottom: 6px;
    }
    .msg-header strong {
      font-size: 1.05rem;
      color: #1a1a2e;
    }
    .msg-date {
      font-size: 0.85rem;
      color: #6c757d;
    }
    .msg-status {
      font-size: 0.8rem;
      padding: 3px 12px;
      border-radius: 30px;
      background: #e9ecef;
    }
    .msg-status.read {
      background: #d4edda;
      color: #155724;
    }
    .msg-status.unread {
      background: #fff3cd;
      color: #856404;
    }
    .msg-email {
      font-size: 0.9rem;
      color: #495057;
      margin-bottom: 4px;
    }
    .msg-body {
      margin: 10px 0 6px;
      white-space: pre-wrap;
      word-break: break-word;
      color: #212529;
    }
    .read-btn {
      background: #28a745;
      padding: 6px 18px;
      font-size: 14px;
      border-radius: 30px;
      margin-top: 6px;
    }
    .read-btn:hover {
      background: #1e7e34;
      transform: none;
      box-shadow: 0 4px 10px rgba(40, 167, 69, 0.3);
    }

    /* ----- Login box ----- */
    .login-box {
      max-width: 420px;
      margin: 0 auto;
    }

    /* ----- Utilities ----- */
    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    .text-center {
      text-align: center;
    }
    .mt-20 {
      margin-top: 20px;
    }
    .link {
      color: #e94560;
      text-decoration: none;
      font-weight: 500;
    }
    .link:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .container {
        padding: 22px 18px;
      }
      .brand {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <!-- React 19 via Import Map -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://unpkg.com/react@19.0.0/index.js",
        "react-dom": "https://unpkg.com/react-dom@19.0.0/index.js",
        "react-dom/client": "https://unpkg.com/react-dom@19.0.0/client.js"
      }
    }
  </script>

  <!-- Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

  <!-- ================== REACT APPLICATION ================== -->
  <script type="text/babel">
    const { useState, useEffect, useContext, createContext, useCallback } = React;

    // -------------------------------------------------------------
    // 1. API Client (with JWT interceptor)
    // -------------------------------------------------------------
    const api = {
      base: '/api',
      async request(endpoint, method = 'GET', body = null) {
        const token = localStorage.getItem('adminToken');
        const headers = {
          'Content-Type': 'application/json',
          ...(token ? { Authorization: `Bearer ${token}` } : {}),
        };
        const options = { method, headers };
        if (body) options.body = JSON.stringify(body);

        const res = await fetch(`${this.base}${endpoint}`, options);
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          const err = new Error(data.error || 'Request failed');
          err.status = res.status;
          err.data = data;
          throw err;
        }
        return data;
      },
      get(url) { return this.request(url, 'GET'); },
      post(url, body) { return this.request(url, 'POST', body); },
      put(url, body) { return this.request(url, 'PUT', body); },
      delete(url) { return this.request(url, 'DELETE'); },
    };

    // -------------------------------------------------------------
    // 2. Auth Context
    // -------------------------------------------------------------
    const AuthContext = createContext(null);

    function AuthProvider({ children }) {
      const [isAdmin, setIsAdmin] = useState(false);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const token = localStorage.getItem('adminToken');
        if (token) {
          api.get('/admin/messages')
            .then(() => setIsAdmin(true))
            .catch(() => {
              localStorage.removeItem('adminToken');
              setIsAdmin(false);
            })
            .finally(() => setLoading(false));
        } else {
          setLoading(false);
        }
      }, []);

      const login = async (password) => {
        try {
          const data = await api.post('/admin/login', { password });
          localStorage.setItem('adminToken', data.token);
          setIsAdmin(true);
          return { success: true };
        } catch (err) {
          return { success: false, error: err.data?.error || 'Login failed' };
        }
      };

      const logout = () => {
        localStorage.removeItem('adminToken');
        setIsAdmin(false);
        api.post('/admin/logout').catch(() => {});
      };

      return (
        <AuthContext.Provider value={{ isAdmin, loading, login, logout }}>
          {children}
        </AuthContext.Provider>
      );
    }

    function useAuth() {
      return useContext(AuthContext);
    }

    // -------------------------------------------------------------
    // 3. Custom Hook: useMessages
    // -------------------------------------------------------------
    function useMessages() {
      const [messages, setMessages] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      const load = useCallback(async () => {
        setLoading(true);
        try {
          const data = await api.get('/admin/messages');
          setMessages(data);
          setError(null);
        } catch (err) {
          setError(err.data?.error || 'Failed to load messages');
        } finally {
          setLoading(false);
        }
      }, []);

      const send = async (data) => {
        try {
          const result = await api.post('/messages', data);
          return { success: true, data: result };
        } catch (err) {
          return { success: false, error: err.data?.error || 'Failed to send' };
        }
      };

      const markRead = async (id) => {
        try {
          await api.put(`/admin/messages/${id}`);
          await load(); // refresh
          return { success: true };
        } catch (err) {
          return { success: false, error: 'Failed to update status' };
        }
      };

      useEffect(() => {
        load();
      }, [load]);

      return { messages, loading, error, send, markRead };
    }

    // -------------------------------------------------------------
    // 4. Components
    // -------------------------------------------------------------
    function MessageForm() {
      const [nama, setNama] = useState('');
      const [email, setEmail] = useState('');
      const [pesan, setPesan] = useState('');
      const [status, setStatus] = useState({ type: '', msg: '' });
      const { send } = useMessages();

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!nama.trim() || !pesan.trim()) {
          setStatus({ type: 'error', msg: 'Name and message are required.' });
          return;
        }
        const result = await send({ nama, email, pesan });
        if (result.success) {
          setStatus({ type: 'success', msg: '✅ Request sent successfully!' });
          setNama('');
          setEmail('');
          setPesan('');
        } else {
          setStatus({ type: 'error', msg: '❌ ' + result.error });
        }
      };

      return (
        <form onSubmit={handleSubmit}>
          <div className="form-group">
            <label>Full Name *</label>
            <input
              type="text"
              value={nama}
              onChange={(e) => setNama(e.target.value)}
              placeholder="Your full name"
              required
            />
          </div>
          <div className="form-group">
            <label>Email Address</label>
            <input
              type="email"
              value={email}
              onChange={(e) => setEmail(e.target.value)}
              placeholder="you@example.com"
            />
          </div>
          <div className="form-group">
            <label>Request Details *</label>
            <textarea
              rows="5"
              value={pesan}
              onChange={(e) => setPesan(e.target.value)}
              placeholder="Describe your request in detail..."
              required
            />
          </div>
          {status.msg && (
            <div className={`info ${status.type}`}>{status.msg}</div>
          )}
          <button type="submit">Submit Request</button>
        </form>
      );
    }

    function MessageList({ items, onMarkRead }) {
      function escape(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      if (items.length === 0) {
        return <p style={{ color: '#6c757d' }}><em>No requests yet.</em></p>;
      }

      const sorted = [...items].sort((a, b) => b.id - a.id);

      return (
        <div>
          {sorted.map((msg) => (
            <div key={msg.id} className={`message-item ${msg.sudahDibaca ? 'read' : 'unread'}`}>
              <div className="msg-header">
                <strong>{escape(msg.nama)}</strong>
                <span className="msg-date">{msg.tanggal}</span>
                <span className={`msg-status ${msg.sudahDibaca ? 'read' : 'unread'}`}>
                  {msg.sudahDibaca ? '✅ Read' : '🆕 Unread'}
                </span>
              </div>
              <div className="msg-email">📧 {escape(msg.email || '-')}</div>
              <div className="msg-body">{escape(msg.pesan)}</div>
              {!msg.sudahDibaca && (
                <button className="read-btn" onClick={() => onMarkRead(msg.id)}>
                  Mark as Read
                </button>
              )}
            </div>
          ))}
        </div>
      );
    }

    function ProtectedRoute({ children }) {
      const { isAdmin, loading } = useAuth();
      if (loading) return <div className="container text-center">Checking session...</div>;
      if (!isAdmin) {
        window.location.hash = '#login';
        return null;
      }
      return children;
    }

    // -------------------------------------------------------------
    // 5. Pages
    // -------------------------------------------------------------
    function PublicPage() {
      return (
        <div className="container">
          <div className="brand">SAIN<span>♱</span>S</div>
          <h1>📨 Submit a Request</h1>
          <MessageForm />
          <hr />
          <p className="text-center">
            <a href="#login" className="link">🔐 Admin Login</a>
          </p>
        </div>
      );
    }

    function LoginPage() {
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const { login } = useAuth();

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        const result = await login(password);
        if (result.success) {
          window.location.hash = '#admin';
        } else {
          setError(result.error || 'Invalid password');
        }
      };

      return (
        <div className="container login-box">
          <div className="brand" style={{ fontSize: '1.8rem' }}>SAIN<span>♱</span>S</div>
          <h1 style={{ fontSize: '1.5rem' }}>🔑 Admin Login</h1>
          <form onSubmit={handleSubmit}>
            <div className="form-group">
              <label>Password</label>
              <input
                type="password"
                value={password}
                onChange={(e) => setPassword(e.target.value)}
                placeholder="Enter admin password"
                required
              />
            </div>
            {error && <div className="info error">{error}</div>}
            <button type="submit">Login</button>
          </form>
          <p className="text-center mt-20">
            <a href="#/" className="link">← Back to Public</a>
          </p>
        </div>
      );
    }

    function AdminPage() {
      const { logout } = useAuth();
      const { messages, loading, markRead } = useMessages();

      return (
        <div className="container">
          <div className="flex-between">
            <h1>📩 Admin Dashboard <small>SAIN♱S</small></h1>
            <button onClick={logout} className="btn-danger">Logout</button>
          </div>
          {loading ? (
            <p>Loading requests...</p>
          ) : (
            <MessageList items={messages} onMarkRead={markRead} />
          )}
        </div>
      );
    }

    // -------------------------------------------------------------
    // 6. Router (Hash-based)
    // -------------------------------------------------------------
    function App() {
      const [hash, setHash] = useState(window.location.hash || '#/');

      useEffect(() => {
        const handler = () => setHash(window.location.hash || '#/');
        window.addEventListener('hashchange', handler);
        return () => window.removeEventListener('hashchange', handler);
      }, []);

      const renderPage = () => {
        switch (hash) {
          case '#/':
          case '#public':
            return <PublicPage />;
          case '#login':
            return <LoginPage />;
          case '#admin':
            return (
              <ProtectedRoute>
                <AdminPage />
              </ProtectedRoute>
            );
          default:
            return <PublicPage />;
        }
      };

      return <AuthProvider>{renderPage()}</AuthProvider>;
    }

    // -------------------------------------------------------------
    // 7. Render
    // -------------------------------------------------------------
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

</body>
  </html>
