  <style>
    /* ===== RESET & GLOBAL ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0b0e1a;
      color: #e5e9f0;
      overflow-x: hidden;

      min-height: 100dvh;

      -moz-osx-font-smoothing: grayscale;
      touch-action: manipulation;
    }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
    ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #6366f1; }

    /* ===== PARTICLES ===== */
    #particles-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      z-index: 0;
      pointer-events: none;
    }

    /* ===== APP WRAPPER ===== */
    .app-wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;

    }

    /* ===== HEADER ===== */

      backdrop-filter: blur(18px) saturate(1.2);
      -webkit-backdrop-filter: blur(18px) saturate(1.2);
      background: rgba(11, 14, 26, 0.6);
      border-bottom: 1px solid rgba(255,255,255,0.04);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transition: background 0.3s;
    }
    .header-logo {

      transition: filter 0.3s;
      flex-shrink: 0;
    }
    .header-logo:hover { filter: drop-shadow(0 0 28px rgba(79, 70, 229, 0.5)); }
    .header-logo img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid rgba(79, 70, 229, 0.4);
      object-fit: cover;
      flex-shrink: 0;

    }
    @media (max-width: 480px) {
      .header-logo img { width: 34px; height: 34px; }
      .header-logo span { font-size: 1.05rem; }

    /* ===== GLASS CARD ===== */
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 1.5rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.35s ease;
    }
    .glass-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(79, 70, 229, 0.10);
    }

    /* ===== NEWS CARD ===== */
    .news-card {
      background: rgba(255, 255, 255, 0.025);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 1.2rem;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      cursor: pointer;
      will-change: transform;
    }
    .news-card:active { transform: scale(0.97); }
    .news-card:hover {
      transform: translateY(-8px) scale(1.01);
      border-color: rgba(79, 70, 229, 0.2);
      box-shadow: 0 20px 60px rgba(79, 70, 229, 0.08);
    }
    .news-card img {
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: transform;
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: rgba(255,255,255,0.02);
    }
    .news-card:hover img { transform: scale(1.04); }
    .news-card .card-body { padding: 1.25rem; }
    .news-card .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 0.4rem;
    }
    .news-card .card-excerpt {
      font-size: 0.875rem;
      color: rgba(255,255,255,0.5);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    @media (max-width: 480px) {
      .news-card img { height: 160px; }
      .news-card .card-body { padding: 1rem; }
      .news-card .card-title { font-size: 1rem; }
    }

    /* ===== GLOWING BUTTON ===== */
    .glowing-btn-wrapper {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      padding: 0;
      cursor: pointer;
      outline: none;
      user-select: none;
      text-decoration: none;
      box-sizing: border-box;
      transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
      overflow: visible;
      font-family: inherit;
    }
    .glowing-btn-wrapper:hover:not(:disabled) { transform: scale(1.025); }
    .glowing-btn-wrapper:active:not(:disabled) { transform: scale(0.97); }
    .glowing-btn-wrapper:disabled { cursor: not-allowed; opacity: 0.5; }

    .glowing-btn-border-track {
      position: absolute;
      inset: 0;
      padding: 1.5px;
      overflow: hidden;
      z-index: 1;
      pointer-events: none;
    }
    .shape-pill,
    .shape-pill .glowing-btn-border-track,
    .shape-pill .glowing-btn-content,
    .shape-pill .glowing-btn-glow-layer {
      border-radius: 9999px;
    }
    .shape-rounded,
    .shape-rounded .glowing-btn-border-track,
    .shape-rounded .glowing-btn-glow-layer {
      border-radius: 12px;
    }
    .shape-rounded .glowing-btn-content {
      border-radius: 10.5px;
    }

    .glowing-btn-spinner {
      position: absolute;
      top: -150%;
      left: -150%;
      width: 400%;
      height: 400%;
      transform-origin: center;
    }
    @keyframes glowing-btn-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .speed-slow .glowing-btn-spinner { animation: glowing-btn-spin 8s linear infinite; }
    .speed-normal .glowing-btn-spinner { animation: glowing-btn-spin 4s linear infinite; }
    .speed-fast .glowing-btn-spinner { animation: glowing-btn-spin 1.8s linear infinite; }

    .preset-aurora .glowing-btn-spinner {
      background: conic-gradient(from 0deg, transparent 0deg, #3b82f6 60deg, #d946ef 120deg, #8b5cf6 180deg, #06b6d4 240deg, #3b82f6 300deg, transparent 360deg);
    }
    .preset-cyber .glowing-btn-spinner {
      background: conic-gradient(from 0deg, transparent 0deg, #10b981 30deg, transparent 70deg, transparent 180deg, #06b6d4 210deg, transparent 250deg, transparent 360deg);
    }
    .preset-ember .glowing-btn-spinner {
      background: conic-gradient(from 0deg, transparent 0deg, #f97316 45deg, #ef4444 135deg, #eab308 225deg, #f97316 315deg, transparent 360deg);
    }
    .preset-glass .glowing-btn-spinner {
      background: conic-gradient(from 0deg, transparent 0deg, rgba(255,255,255,0.05) 90deg, rgba(255,255,255,0.7) 180deg, rgba(255,255,255,0.05) 270deg, rgba(255,255,255,0.7) 360deg);
    }

    .glowing-btn-glow-layer {
      position: absolute;
      inset: -2px;
      z-index: 0;
      pointer-events: none;
      transition: opacity 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      overflow: hidden;
    }
    .glow-none { display: none; }
    .glow-low { filter: blur(8px); opacity: 0.35; }
    .glow-medium { filter: blur(16px); opacity: 0.6; }
    .glow-high { filter: blur(28px); opacity: 0.85; }
    .glowing-btn-wrapper:hover:not(:disabled) .glow-low { opacity: 0.65; }
    .glowing-btn-wrapper:hover:not(:disabled) .glow-medium { opacity: 0.85; }
    .glowing-btn-wrapper:hover:not(:disabled) .glow-high { opacity: 1; }

    .glowing-btn-content {
      position: relative;
      z-index: 2;
      margin: 1.5px;
      padding: 12px 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      color: #ffffff;
      background: #09090b;
      transition: background 0.3s ease, color 0.3s ease;
    }
    .preset-glass .glowing-btn-content {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .glowing-btn-wrapper:hover:not(:disabled) .glowing-btn-content {
      background: #121215;
    }
    .preset-glass.glowing-btn-wrapper:hover:not(:disabled) .glowing-btn-content {
      background: rgba(255,255,255,0.07);
    }

    .glowing-btn-wrapper:focus-visible {
      box-shadow: 0 0 0 3px #000, 0 0 0 5px rgba(255,255,255,0.55);
    }
    .glowing-btn-wrapper:disabled .glowing-btn-border-track {
      background: rgba(255,255,255,0.05) !important;
    }
    .glowing-btn-wrapper:disabled .glowing-btn-spinner {
      display: none !important;
    }
    .glowing-btn-wrapper:disabled .glowing-btn-glow-layer {
      display: none !important;
    }
    .glowing-btn-wrapper:disabled .glowing-btn-content {
      background: rgba(255,255,255,0.02) !important;
      color: rgba(255,255,255,0.2) !important;
    }

    /* ===== DETAIL ===== */
    .detail-content {

    /* ===== FOOTER ===== */
    .footer {

      margin-top: 2.5rem;

    #mainContent {

    @supports (padding: max(0px)) {

    .hero-headline {

    @media (min-width: 768px) {

  <script>
    // ==================== PARTICLES ====================
    (function initParticles() {
      const canvas = document.getElementById('particles-canvas');
      const ctx = canvas.getContext('2d');
      let width, height, particles = [];
      const NUM = 100;
      let animId;

      function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      class Particle {
        constructor() {
          this.x = Math.random() * width;
          this.y = Math.random() * height;
          this.size = Math.random() * 2.2 + 0.3;
          this.speedX = (Math.random() - 0.5) * 0.35;
          this.speedY = (Math.random() - 0.5) * 0.35;
          this.opacity = Math.random() * 0.5 + 0.15;
        }
        update() {
          this.x += this.speedX;
          this.y += this.speedY;
          if (this.x < 0 || this.x > width) this.speedX *= -1;
          if (this.y < 0 || this.y > height) this.speedY *= -1;
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
          ctx.fill();
          ctx.shadowColor = 'rgba(79, 70, 229, 0.2)';
          ctx.shadowBlur = 6;
        }
      }

      for (let i = 0; i < NUM; i++) particles.push(new Particle());

      function drawLines() {
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 140) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(79, 70, 229, ${0.06 * (1 - dist / 140)})`;
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
        }
      }

      function animate() {
        ctx.clearRect(0, 0, width, height);
        particles.forEach(p => { p.update(); p.draw(); });
        drawLines();
        animId = requestAnimationFrame(animate);
      }
      animate();

      window.addEventListener('beforeunload', () => {
        if (animId) cancelAnimationFrame(animId);
      });
    })();

    // ==================== DATA LAYER ====================
    const STORAGE_KEY = 'newsData';
    const RECENT_KEY = 'recentSearches';
    const DEFAULT_NEWS = [
      {
        id: '1',
        title: 'Welcome to INFORMATION SAINTS',
        slug: 'welcome-to-information-saints',
        content: 'This is the first article on INFORMATION SAINTS. You can edit, delete, or add new articles via the Admin panel.\n\nAll data is stored locally in your browser using localStorage. This makes the website fast and self-contained.\n\nEnjoy exploring!',
        excerpt: 'Welcome to INFORMATION SAINTS – your trusted source for quality news.',
        image: 'https://files.catbox.moe/4yfb2h.jpg',
        createdAt: new Date().toISOString()
      }
    ];
    const SUGGESTED_TAGS = ['Technology', 'Design', 'Innovation', 'AI', 'Startups', 'Culture'];

    function getNews() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const data = JSON.parse(raw);
          if (Array.isArray(data) && data.length) return data;
        }
      } catch {}
      localStorage.setItem(STORAGE_KEY, JSON.stringify(DEFAULT_NEWS));
      return [...DEFAULT_NEWS];
    }

    function saveNews(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function getRecentSearches() {
      try {
        const raw = localStorage.getItem(RECENT_KEY);
        if (raw) {
          const data = JSON.parse(raw);
          if (Array.isArray(data)) return data;
        }
      } catch {}
      return [];
    }

    function saveRecentSearches(arr) {
      const unique = [...new Set(arr)];
      const trimmed = unique.slice(0, 8);
      localStorage.setItem(RECENT_KEY, JSON.stringify(trimmed));
    }

    function addRecentSearch(query) {
      const recent = getRecentSearches();
      const filtered = recent.filter(q => q.toLowerCase() !== query.toLowerCase());
      filtered.unshift(query);
      saveRecentSearches(filtered);
    }

    function removeRecentSearch(query) {
      const recent = getRecentSearches();
      const filtered = recent.filter(q => q.toLowerCase() !== query.toLowerCase());
      saveRecentSearches(filtered);
    }

    // ==================== EXPANDING SEARCH ====================
    function renderExpandingSearch(container, onSearch, initialValue) {
      const wrapper = document.createElement('div');
      wrapper.className = 'exp-search-wrapper';
      wrapper.id = 'expSearchWrapper';

      const pill = document.createElement('div');
      pill.className = 'exp-search-pill';
      pill.id = 'expSearchPill';
      pill.setAttribute('role', 'search');

      const iconBtn = document.createElement('button');
      iconBtn.className = 'exp-search-icon-btn';
      iconBtn.setAttribute('aria-label', 'Search');
      iconBtn.type = 'button';
      iconBtn.innerHTML = '<i class="fas fa-search" style="font-size:1rem;"></i>';
      iconBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        expandSearch();
      });

      const inputWrapper = document.createElement('div');
      inputWrapper.className = 'exp-search-input-wrapper';

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'exp-search-input';
      input.placeholder = 'Search news, topics...';
      input.id = 'expSearchInput';
      input.autocomplete = 'off';
      if (initialValue) input.value = initialValue;

      inputWrapper.appendChild(input);

      const clearBtn = document.createElement('button');
      clearBtn.className = 'exp-search-clear-btn';
      clearBtn.type = 'button';
      clearBtn.setAttribute('aria-label', 'Clear');
      clearBtn.innerHTML = '<i class="fas fa-times" style="font-size:0.7rem;"></i>';
      clearBtn.id = 'expClearBtn';

      const shortcut = document.createElement('span');
      shortcut.className = 'exp-search-shortcut';
      shortcut.textContent = '⌘K';

      const badge = document.createElement('span');
      badge.className = 'exp-search-badge';
      badge.id = 'expSearchBadge';
      badge.textContent = '';

      pill.appendChild(iconBtn);
      pill.appendChild(inputWrapper);
      pill.appendChild(clearBtn);
      pill.appendChild(shortcut);
      pill.appendChild(badge);
      wrapper.appendChild(pill);
      container.appendChild(wrapper);

      let isExpanded = false;
      let currentValue = initialValue || '';

      function expandSearch() {
        if (isExpanded) return;
        isExpanded = true;
        pill.classList.add('expanded');
        setTimeout(() => {
          input.focus();
          input.setSelectionRange(input.value.length, input.value.length);
        }, 200);
        updateClearBtn();
      }

      function collapseSearch() {
        if (!isExpanded) return;
        isExpanded = false;
        pill.classList.remove('expanded');
        if (onSearch) onSearch('');
        updateClearBtn();
      }

      function updateClearBtn() {
        const hasValue = input.value.length > 0;
        clearBtn.classList.toggle('visible', hasValue);
        shortcut.classList.toggle('visible', isExpanded && !hasValue);
        badge.classList.toggle('visible', isExpanded && hasValue);
        if (hasValue && isExpanded) {
          const count = getNews().filter(item =>
            item.title.toLowerCase().includes(input.value.toLowerCase()) ||
            item.content.toLowerCase().includes(input.value.toLowerCase())
          ).length;
          badge.textContent = `${count} result${count !== 1 ? 's' : ''}`;
        } else {
          badge.textContent = '';
        }
      }

      input.addEventListener('input', () => {
        currentValue = input.value;
        updateClearBtn();
        if (onSearch) onSearch(currentValue);
      });

      clearBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        input.value = '';
        currentValue = '';
        updateClearBtn();
        if (onSearch) onSearch('');
        input.focus();
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const val = input.value.trim();
          if (val) {
            addRecentSearch(val);
            if (onSearch) onSearch(val);
            collapseSearch();
            input.blur();
          }
        }
        if (e.key === 'Escape') {
          collapseSearch();
          input.blur();
        }
      });

      document.addEventListener('click', (e) => {
        if (!wrapper.contains(e.target)) {
          if (isExpanded && !input.value) {
            collapseSearch();
          }
        }
      });

      input.addEventListener('focus', () => {
        if (!isExpanded) expandSearch();
        updateClearBtn();
      });

      document.addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
          e.preventDefault();
          if (!isExpanded) expandSearch();
          input.focus();
        }
      });

      if (initialValue) {
        input.value = initialValue;
        currentValue = initialValue;
        setTimeout(() => expandSearch(), 100);
      }

      wrapper.expand = expandSearch;
      wrapper.collapse = collapseSearch;
      wrapper.getValue = () => input.value;
      wrapper.setValue = (val) => {
        input.value = val;
        currentValue = val;
        updateClearBtn();
        if (onSearch) onSearch(val);
      };

      return wrapper;
    }

    // ==================== CINEMATIC BLUR TEXT ====================
    function renderCinematicBlurText(container, text, className = '') {
      const outer = document.createElement('div');
      outer.className = `cinematic-blur-outer ${className}`;

      const span = document.createElement('span');
      span.className = 'cinematic-blur-container';

      const chars = text.split('');
      const charSpans = [];

      chars.forEach((char, index) => {
        const el = document.createElement('span');
        el.className = 'cinematic-blur-char';
        el.textContent = char === ' ' ? '\u00A0' : char;
        const delay = Math.min(index * 0.03, 1.2);
        el.style.transitionDelay = `${delay}s`;
        span.appendChild(el);
        charSpans.push(el);
      });

      outer.appendChild(span);

      const replayBtn = document.createElement('button');
      replayBtn.className = 'cinematic-replay-btn';
      replayBtn.innerHTML = '<i class="fas fa-play"></i> Replay';
      replayBtn.addEventListener('click', () => {
        charSpans.forEach(el => {
          el.classList.remove('visible');
          el.style.opacity = '0';
          el.style.filter = 'blur(12px)';
          el.style.transform = 'translateY(4px)';
        });
        charSpans.forEach((el, idx) => {
          const delay = Math.min(idx * 0.03, 1.2);
          setTimeout(() => {
            el.classList.add('visible');
            el.style.opacity = '1';
            el.style.filter = 'blur(0px)';
            el.style.transform = 'translateY(0)';
          }, delay * 1000 + 50);
        });
      });

      outer.appendChild(replayBtn);
      container.appendChild(outer);

      requestAnimationFrame(() => {
        charSpans.forEach((el, idx) => {
          const delay = Math.min(idx * 0.03, 1.2);
          setTimeout(() => {
            el.classList.add('visible');
            el.style.opacity = '1';
            el.style.filter = 'blur(0px)';
            el.style.transform = 'translateY(0)';
          }, delay * 1000 + 100);
        });
      });

      return outer;
    }

    // ==================== FLUID SWITCH ====================
    function renderFluidSwitch(container, activeFilter, onChange) {
      const wrapper = document.createElement('div');
      wrapper.className = 'fluid-switch-wrapper';

      const track = document.createElement('div');
      track.className = 'fluid-switch-track';

      const items = [
        { key: 'latest', label: 'Latest', icon: 'fa-clock' },
        { key: 'popular', label: 'Popular', icon: 'fa-fire' },
        { key: 'trending', label: 'Trending', icon: 'fa-chart-line' }
      ];

      const indicator = document.createElement('div');
      indicator.className = 'fluid-switch-indicator';
      track.appendChild(indicator);

      items.forEach((item) => {
        const btn = document.createElement('button');
        btn.className = `fluid-switch-item ${item.key === activeFilter ? 'active' : ''}`;
        btn.dataset.key = item.key;
        btn.innerHTML = `<i class="fas ${item.icon} mr-1"></i> ${item.label}`;
        btn.addEventListener('click', () => {
          if (onChange) onChange(item.key);
        });
        track.appendChild(btn);
      });

      wrapper.appendChild(track);
      container.appendChild(wrapper);

      function updateIndicator() {
        const activeBtn = track.querySelector('.fluid-switch-item.active');
        if (!activeBtn) return;
        const trackRect = track.getBoundingClientRect();
        const btnRect = activeBtn.getBoundingClientRect();
        const left = btnRect.left - trackRect.left;
        const width = btnRect.width;
        indicator.style.left = left + 'px';
        indicator.style.width = width + 'px';
      }

      requestAnimationFrame(updateIndicator);
      const resizeObserver = new ResizeObserver(() => updateIndicator());
      resizeObserver.observe(track);

      wrapper.updateIndicator = updateIndicator;
      return wrapper;
    }

    // ==================== DECRYPTION TEXT ====================
    function initDecryptionEffect() {
      const triggers = document.querySelectorAll('.decrypt-trigger');
      triggers.forEach(el => {
        const originalText = el.dataset.text || el.textContent.trim();
        el.dataset.original = originalText;

        let isDecrypting = false;
        let timer = null;

        el.addEventListener('mouseenter', () => {
          if (isDecrypting) return;
          isDecrypting = true;
          const allChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+-=';
          const targetText = el.dataset.original;
          const length = targetText.length;
          let step = 0;
          const totalSteps = 12 + Math.floor(length * 0.3);

          function doDecrypt() {
            if (step >= totalSteps) {
              el.textContent = targetText;
              isDecrypting = false;
              return;
            }
            const revealCount = Math.floor((step / totalSteps) * length);
            const newChars = [];
            for (let i = 0; i < length; i++) {
              if (i < revealCount) {
                newChars[i] = targetText[i];
              } else {
                const randomIdx = Math.floor(Math.random() * allChars.length);
                newChars[i] = allChars[randomIdx];
              }
            }
            el.textContent = newChars.join('');
            step++;
            timer = setTimeout(doDecrypt, 40 + Math.random() * 30);
          }
          doDecrypt();
        });

        el.addEventListener('mouseleave', () => {
          if (timer) {
            clearTimeout(timer);
            timer = null;
          }
          isDecrypting = false;
          if (el.dataset.original) {
            el.textContent = el.dataset.original;
          }
        });
      });
    }

    // ==================== LOADING SKELETON ====================
    function renderSkeleton(container, type = 'grid') {
      let html = '';
      if (type === 'grid') {
        html = `<div class="skeleton-grid">`;
        for (let i = 0; i < 6; i++) {
          html += `
            <div class="skeleton-card">
              <div class="skeleton-image"><div class="skeleton-shimmer"></div></div>
              <div class="skeleton-line long"><div class="skeleton-shimmer"></div></div>
              <div class="skeleton-line medium"><div class="skeleton-shimmer"></div></div>
              <div class="skeleton-line short"><div class="skeleton-shimmer"></div></div>
            </div>
          `;
        }
        html += `</div>`;
      } else if (type === 'detail') {
        html = `
          <div class="skeleton-detail">
            <div class="skeleton-image"><div class="skeleton-shimmer"></div></div>
            <div class="skeleton-line long"><div class="skeleton-shimmer"></div></div>
            <div class="skeleton-line medium"><div class="skeleton-shimmer"></div></div>
            <div class="skeleton-line long"><div class="skeleton-shimmer"></div></div>
            <div class="skeleton-line long"><div class="skeleton-shimmer"></div></div>
            <div class="skeleton-line medium"><div class="skeleton-shimmer"></div></div>
            <div class="skeleton-line short"><div class="skeleton-shimmer"></div></div>
          </div>
        `;
      } else {
        html = `
          <div class="gyro-spinner-wrapper">
            <div class="gyro-spinner">
              <div class="gyro-spinner-ring"></div>
              <div class="gyro-spinner-ring"></div>
              <div class="gyro-spinner-ring"></div>
            </div>
            <div class="gyro-spinner-label">Loading...</div>
          </div>
        `;
      }
      container.innerHTML = html;
    }

    // ==================== NAVIGATION ====================
    function navigate(page, param) {
      if (page === 'detail' && param) {
        window.location.hash = `detail/${param}`;
      } else {
        window.location.hash = '';
      }
      renderPage(page, param);
    }

    function renderPage(page, param) {
      const container = document.getElementById('mainContent');
      container.style.opacity = '0';
      container.style.transform = 'translateY(18px)';
      
      // Show skeleton loading
      if (page === 'home') {
        renderSkeleton(container, 'grid');
      } else if (page === 'detail' && param) {
        renderSkeleton(container, 'detail');
      }
      
      setTimeout(() => {
        if (page === 'home') renderHome(container);
        else if (page === 'detail' && param) renderDetail(container, param);
        else renderHome(container);
        container.style.opacity = '1';
        container.style.transform = 'translateY(0)';
      }, 400);
    }

    // ==================== HOME ====================
    function renderHome(container) {
      const news = getNews();
      const searchQueryParam = new URLSearchParams(window.location.search).get('q') || '';
      const filterParam = new URLSearchParams(window.location.search).get('filter') || 'latest';

      let filtered = [...news];
      if (searchQueryParam) {
        const q = searchQueryParam.toLowerCase();
        filtered = filtered.filter(item =>
          item.title.toLowerCase().includes(q) ||
          item.content.toLowerCase().includes(q) ||
          (item.excerpt && item.excerpt.toLowerCase().includes(q))
        );
      }

      if (filterParam === 'popular') {
        filtered.sort((a, b) => b.content.length - a.content.length);
      } else if (filterParam === 'trending') {
        filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      } else {
        filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      }

      let html = `
        <div class="mb-4">
          <div id="cinematicContainer" class="hero-headline glow-text"></div>
          <p class="text-sm text-gray-500 text-center mt-1">Stay informed with the latest stories</p>
        </div>
        <div class="mb-3" id="searchContainer"></div>
        <div id="filterContainer" class="mb-6"></div>
      `;

      if (filtered.length === 0) {
        html += `
          <div class="no-news">
            <h2>${searchQueryParam ? 'No results found' : 'No news yet'}</h2>
            <p>${searchQueryParam ? `No articles matching "${searchQueryParam}"` : 'Go to Admin to add your first article.'}</p>
            ${searchQueryParam ? `<button class="glowing-btn-wrapper shape-pill speed-normal preset-ember glow-low mt-4" onclick="clearSearch()">
              <div class="glowing-btn-glow-layer glow-low"><div class="glowing-btn-spinner"></div></div>
              <div class="glowing-btn-border-track"><div class="glowing-btn-spinner"></div></div>
              <span class="glowing-btn-content"><i class="fas fa-times mr-2"></i> Clear Search</span>
            </button>` : ''}
          </div>
        `;
      } else {
        html += `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 md:gap-6">`;
        filtered.forEach((item, idx) => {
          const delay = (idx % 3) + 1;
          html += `
            <div class="news-card fade-in fade-in-delay-${delay}" onclick="navigate('detail','${item.slug}')">
              ${item.image ? `<img src="${item.image}" alt="${item.title}" loading="lazy" />` : ''}
              <div class="card-body">
                <div class="card-title decrypt-trigger" data-text="${escapeHtml(item.title)}">
                  ${escapeHtml(item.title)}
                  <div class="decrypt-glow"></div>
                </div>
                <div class="card-excerpt">${escapeHtml(item.excerpt || item.content.slice(0, 120) + '…')}</div>
                <div class="flex items-center justify-between mt-3 text-xs text-gray-500">
                  <span><i class="far fa-calendar mr-1"></i>${formatDate(item.createdAt)}</span>
                  <span><i class="far fa-clock mr-1"></i>${Math.ceil(item.content.length / 250)} min read</span>
                </div>
              </div>
            </div>
          `;
        });
        html += `</div>`;
      }

      html += `
        <div class="mt-12 flex justify-center">
          <div class="profile-card">
            <div class="profile-cover"></div>
            <div class="profile-avatar">
              <img src="https://files.catbox.moe/4yfb2h.jpg" alt="INFORMATION SAINTS" />
            </div>
            <div class="profile-name">
              INFORMATION SAINTS
              <span class="verified-badge"><i class="fas fa-check"></i></span>
            </div>
            <div class="profile-bio">Your trusted source for quality news, insights, and stories from around the world.</div>
            <div class="profile-stats">
              <div class="stat">
                <span class="value">${news.length}</span>
                <span class="label">Articles</span>
              </div>
              <div class="stat">
                <span class="value">∞</span>
                <span class="label">Readers</span>
              </div>
              <div class="stat">
                <span class="value">${new Date().getFullYear()}</span>
                <span class="label">Founded</span>
              </div>
            </div>
            <div class="profile-action">
              <button class="glowing-btn-wrapper shape-pill speed-normal preset-aurora glow-low w-full justify-center" onclick="navigate('home')">
                <div class="glowing-btn-glow-layer glow-low"><div class="glowing-btn-spinner"></div></div>
                <div class="glowing-btn-border-track"><div class="glowing-btn-spinner"></div></div>
                <span class="glowing-btn-content"><i class="fas fa-globe-americas mr-2"></i> Explore All</span>
              </button>
            </div>
          </div>
        </div>
      `;

      container.innerHTML = html;

      const cinematicContainer = document.getElementById('cinematicContainer');
      if (cinematicContainer) {
        renderCinematicBlurText(cinematicContainer, 'INFORMATION SAINTS', '');
      }

      const searchContainer = document.getElementById('searchContainer');
      if (searchContainer) {
        const search = renderExpandingSearch(searchContainer, (query) => {
          if (query) {
            const url = new URL(window.location);
            url.searchParams.set('q', query);
            window.history.pushState({}, '', url);
            renderHome(container);
          } else {
            const url = new URL(window.location);
            url.searchParams.delete('q');
            window.history.pushState({}, '', url);
            renderHome(container);
          }
        }, searchQueryParam);

        if (searchQueryParam) {
          setTimeout(() => {
            if (search && search.expand) search.expand();
          }, 300);
        }
      }

      const filterContainer = document.getElementById('filterContainer');
      if (filterContainer) {
        renderFluidSwitch(filterContainer, filterParam, (filter) => {
          const url = new URL(window.location);
          url.searchParams.set('filter', filter);
          window.history.pushState({}, '', url);
          renderHome(container);
        });
      }

      initDecryptionEffect();
    }

    window.clearSearch = function() {
      const url = new URL(window.location);
      url.searchParams.delete('q');
      window.history.pushState({}, '', url);
      renderPage('home');
    };

    // ==================== DETAIL ====================
    function renderDetail(container, slug) {
      const news = getNews();
      const item = news.find(n => n.slug === slug);
      if (!item) {
        container.innerHTML = `
          <div class="text-center py-16 fade-in">
            <h2 class="text-2xl md:text-3xl font-bold text-red-400">Article Not Found</h2>
            <a href="#" onclick="navigate('home')" class="text-indigo-400 hover:underline mt-4 inline-block">← Back to Home</a>
          </div>
        `;
        return;
      }

      container.innerHTML = `
        <article class="max-w-3xl mx-auto glass-card p-5 md:p-8 fade-in">
          <a href="#" onclick="navigate('home')" class="text-indigo-400 hover:underline inline-block mb-4 text-sm"><i class="fas fa-arrow-left mr-2"></i>Back</a>
          ${item.image ? `<img src="${item.image}" alt="${item.title}" class="w-full h-48 md:h-64 object-cover rounded-xl mb-5" loading="lazy" />` : ''}
          <h1 class="text-2xl md:text-4xl font-extrabold glow-text mb-2">${escapeHtml(item.title)}</h1>
          <div class="text-sm text-gray-500 mb-5"><i class="far fa-calendar mr-2"></i>${formatDate(item.createdAt)}</div>
          <div class="detail-content">${escapeHtml(item.content)}</div>
        </article>
      `;
    }

    // ==================== HELPERS ====================
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function formatDate(iso) {
      if (!iso) return '-';
      try {
        return new Date(iso).toLocaleDateString('en-US', {
          year: 'numeric', month: 'short', day: 'numeric'
        });
      } catch { return iso; }
    }

    // ==================== HASH ROUTING ====================
    function handleHash() {
      const hash = window.location.hash.slice(1);
      if (hash.startsWith('detail/')) {
        const slug = hash.replace('detail/', '');
        navigate('detail', slug);
      } else {
        navigate('home');
      }
    }

    window.addEventListener('hashchange', handleHash);
    window.addEventListener('DOMContentLoaded', () => {
      getNews();
      handleHash();
    });

    window.navigate = navigate;
  </script>
